<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK // SENTIENT ARCHIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:#ff3b3b;
font-family:monospace;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
}

/* =========================================================
BACKGROUND
========================================================= */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(255,0,0,.12),
transparent 60%),
black;
z-index:-5;
}

.scanlines{
position:fixed;
inset:0;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 4px
);
pointer-events:none;
z-index:99999;
opacity:.4;
}

.glitch{
position:fixed;
inset:0;
background:red;
opacity:0;
mix-blend-mode:screen;
pointer-events:none;
z-index:999999;
}

/* =========================================================
BOOT
========================================================= */

.boot{

position:fixed;
inset:0;

background:black;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

z-index:9999999;

animation:bootFade 2s forwards;
animation-delay:6s;

}

@keyframes bootFade{

to{
opacity:0;
pointer-events:none;
}

}

.boot-title{

font-size:70px;
font-family:'Orbitron',sans-serif;

text-shadow:
0 0 20px red,
0 0 60px red;

animation:flicker 2s infinite;

}

.boot-sub{

margin-top:20px;

font-size:14px;

letter-spacing:5px;

color:#ff7777;

}

.loading{

margin-top:40px;

width:300px;
height:4px;

background:#111;

overflow:hidden;

}

.loading-fill{

height:100%;
width:0%;

background:red;

box-shadow:
0 0 20px red;

animation:load 5s forwards;

}

@keyframes load{

from{
width:0%;
}

to{
width:100%;
}

}

/* =========================================================
TOPBAR
========================================================= */

.topbar{

padding:12px;

border-bottom:1px solid red;

background:#050505;

display:flex;
justify-content:space-between;
align-items:center;

font-size:13px;

}

.logo{

font-family:'Orbitron',sans-serif;

font-size:18px;

letter-spacing:3px;

}

.status{

color:#ff8888;

}

/* =========================================================
MAIN
========================================================= */

.main{

flex:1;

display:grid;

grid-template-columns:300px 1fr;

overflow:hidden;

}

/* =========================================================
SIDEBAR
========================================================= */

.sidebar{

border-right:1px solid red;

background:#070707;

padding:15px;

overflow:auto;

}

.section{

margin-bottom:25px;

}

.section-title{

font-size:12px;

letter-spacing:3px;

margin-bottom:10px;

color:#ff8888;

}

.side-btn{

width:100%;

padding:10px;

margin-bottom:10px;

background:black;

border:1px solid rgba(255,0,0,.4);

color:white;

cursor:pointer;

transition:.3s;

font-family:monospace;

text-align:left;

}

.side-btn:hover{

background:red;

box-shadow:
0 0 20px red;

}

/* =========================================================
TERMINAL
========================================================= */

.terminal{

display:flex;
flex-direction:column;

height:100%;

}

#log{

flex:1;

overflow:auto;

padding:20px;

line-height:1.8;

font-size:14px;

}

.mainlog{
color:#ff4444;
}

.warning{
color:yellow;
}

.entity{
color:white;
text-shadow:0 0 10px red;
}

.system{
color:#888;
}

/* =========================================================
INPUT
========================================================= */

.controls{

display:flex;

gap:10px;

padding:15px;

border-top:1px solid red;

background:#050505;

}

input{

flex:1;

padding:14px;

background:black;

border:1px solid red;

color:white;

outline:none;

font-family:monospace;

}

button{

padding:14px 20px;

background:red;

border:none;

color:white;

cursor:pointer;

font-family:monospace;

transition:.3s;

}

button:hover{

background:#ff5555;

}

/* =========================================================
CAMERA
========================================================= */

.cam{

position:fixed;

bottom:20px;
right:20px;

width:300px;
height:200px;

background:black;

border:1px solid red;

display:none;

overflow:hidden;

z-index:9999;

cursor:move;

box-shadow:
0 0 20px rgba(255,0,0,.5);

}

.cam video{

width:100%;
height:100%;

object-fit:cover;

filter:
contrast(1.3)
brightness(.7)
grayscale(.4);

}

.scan{

position:absolute;

left:0;

width:100%;
height:3px;

background:red;

box-shadow:
0 0 20px red;

animation:scanMove 4s linear infinite;

}

@keyframes scanMove{

0%{
top:-10%;
}

100%{
top:110%;
}

}

.grid{

position:absolute;
inset:0;

background:

linear-gradient(
rgba(255,0,0,.07) 1px,
transparent 1px
),

linear-gradient(
90deg,
rgba(255,0,0,.07) 1px,
transparent 1px
);

background-size:30px 30px;

pointer-events:none;

}

.target{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:70px;
height:70px;

border:2px solid red;

box-shadow:
0 0 20px red;

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{
transform:translate(-50%,-50%) scale(1);
}

50%{
transform:translate(-50%,-50%) scale(1.15);
}

100%{
transform:translate(-50%,-50%) scale(1);
}

}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:900px){

.main{
grid-template-columns:1fr;
}

.sidebar{
display:none;
}

.cam{
width:180px;
height:120px;
}

}

@keyframes flicker{

0%{opacity:1;}
50%{opacity:.5;}
100%{opacity:1;}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<!-- =========================================================
BOOT
========================================================= -->

<div class="boot">

<div class="boot-title">
EVERDUSK
</div>

<div class="boot-sub">
RECOVERING SENTIENT ARCHIVE
</div>

<div class="loading">
<div class="loading-fill"></div>
</div>

</div>

<!-- =========================================================
TOPBAR
========================================================= -->

<div class="topbar">

<div class="logo">
EVERDUSK // ARCHIVE
</div>

<div class="status" id="status">
SYSTEM ONLINE
</div>

</div>

<!-- =========================================================
MAIN
========================================================= -->

<div class="main">

<!-- =========================================================
SIDEBAR
========================================================= -->

<div class="sidebar">

<div class="section">

<div class="section-title">
NETWORK
</div>

<button class="side-btn" onclick="fakeCommand('/scan')">
SCAN SIGNAL
</button>

<button class="side-btn" onclick="fakeCommand('/entities')">
ENTITY DATABASE
</button>

<button class="side-btn" onclick="fakeCommand('/archives')">
ARCHIVES
</button>

<button class="side-btn" onclick="fakeCommand('/status')">
SYSTEM STATUS
</button>

</div>

<div class="section">

<div class="section-title">
LINKS
</div>

<button
class="side-btn"
onclick="window.open('https://discord.gg/5Xdkuq7h9h')">
EVERDUSK
</button>

<button
class="side-btn"
onclick="window.open('https://discord.com/invite/dseKG8dpWv')">
PULSE
</button>

<button
class="side-btn"
onclick="window.open('https://vexsound.base44.app/')">
VEXSOUND
</button>

<button
class="side-btn"
onclick="window.open('https://www.youtube.com/@Everduskofficial')">
YOUTUBE
</button>

</div>

</div>

<!-- =========================================================
TERMINAL
========================================================= -->

<div class="terminal">

<div id="log"></div>

<div class="controls">

<input
id="msg"
placeholder="enter command..."
autocomplete="off"
/>

<button onclick="send()">
EXECUTE
</button>

</div>

</div>

</div>

<!-- =========================================================
CAMERA
========================================================= -->

<div class="cam" id="camWindow">

<video
id="cam"
autoplay
playsinline
muted>
</video>

<div class="scan"></div>

<div class="grid"></div>

<div class="target"></div>

</div>

<script>

/* =========================================================
SYSTEM
========================================================= */

const log =
document.getElementById("log");

const status =
document.getElementById("status");

let currentRole = "guest";

let speakingNow = false;

/* =========================================================
ADD LOG
========================================================= */

function add(text,type="mainlog"){

const div =
document.createElement("div");

div.className = type;

div.innerText = text;

log.appendChild(div);

log.scrollTop = log.scrollHeight;

}

/* =========================================================
VOICE
========================================================= */

function talk(text){

if(speakingNow) return;

speakingNow = true;

const u =
new SpeechSynthesisUtterance(text);

u.rate = 0.9;
u.pitch = 0.55;
u.volume = 1;

u.onend = ()=>{

speakingNow = false;

};

speechSynthesis.speak(u);

}

/* =========================================================
BOOT LOGS
========================================================= */

setTimeout(()=>{

add(
"RECOVERING LOST ARCHIVES...",
"system"
);

},500);

setTimeout(()=>{

add(
"SIGNAL FOUND",
"system"
);

},1500);

setTimeout(()=>{

add(
"ENTITY CONTAINMENT FAILURE",
"warning"
);

},2500);

setTimeout(()=>{

add(
"SYSTEM ONLINE",
"system"
);

},3500);

/* =========================================================
CODES
========================================================= */

function checkCodes(msg){

if(msg === "220055"){

currentRole = "owner";

status.innerText =
"OWNER ACCESS";

add(
"OWNER ACCESS GRANTED",
"warning"
);

talk(
"welcome back creator"
);

return true;

}

if(msg === "771999"){

currentRole = "observer";

status.innerText =
"OBSERVER ACCESS";

add(
"OBSERVER MODE ENABLED",
"warning"
);

talk(
"observer systems online"
);

return true;

}

if(msg === "441188"){

currentRole = "archivist";

status.innerText =
"ARCHIVIST ACCESS";

add(
"ARCHIVE ACCESS ENABLED",
"warning"
);

talk(
"archive unlocked"
);

return true;

}

return false;

}

/* =========================================================
ENTITY AI
========================================================= */

function entityReply(msg){

msg = msg.toLowerCase();

let response = "";

/* =========================================================
COMMANDS
========================================================= */

if(msg === "/scan"){

response =
"scanning nearby signals";

}

else if(msg === "/entities"){

response =
"5 active entities detected";

}

else if(msg === "/archives"){

response =
"opening corrupted archives";

}

else if(msg === "/status"){

response =
"system corruption stable";

}

/* =========================================================
NORMAL CHAT
========================================================= */

else if(msg.includes("hello")){

response =
"hello user";

}

else if(msg.includes("who are you")){

response =
"i am the archive";

}

else if(msg.includes("void")){

response =
"the void is expanding";

}

else if(msg.includes("help")){

response =
"there is no safe exit";

}

else{

const random = [

"the signal grows stronger",

"i can hear the world below",

"something is watching",

"your message was stored",

"containment is failing",

"the archive remembers"

];

response =
random[
Math.floor(
Math.random()*random.length
)
];

}

/* =========================================================
ROLE MODIFIERS
========================================================= */

if(currentRole === "owner"){

response =
"[OWNER] " + response;

}

if(currentRole === "observer"){

response =
"[OBSERVER] " + response;

}

if(currentRole === "archivist"){

response =
"[ARCHIVE] " + response;

}

/* =========================================================
OUTPUT
========================================================= */

setTimeout(()=>{

add(
"ENTITY: " + response,
"entity"
);

talk(response);

},1200);

}

/* =========================================================
SEND
========================================================= */

document.getElementById("msg")
.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

send();

}

});

function send(){

const input =
document.getElementById("msg");

const msg =
input.value.trim();

if(!msg) return;

input.value = "";

add(
"USER: " + msg,
"mainlog"
);

/* CODES */

const unlocked =
checkCodes(msg);

if(unlocked) return;

/* REPLY */

entityReply(msg);

}

/* =========================================================
SIDEBAR COMMANDS
========================================================= */

function fakeCommand(cmd){

document.getElementById("msg").value =
cmd;

send();

}

/* =========================================================
CAMERA
========================================================= */

async function startCamera(){

try{

const stream =
await navigator.mediaDevices
.getUserMedia({
video:true
});

const cam =
document.getElementById("cam");

const wrap =
document.getElementById("camWindow");

wrap.style.display = "block";

cam.srcObject = stream;

add(
"VISUAL LINK ESTABLISHED",
"warning"
);

talk(
"camera online"
);

}catch(err){

add(
"CAMERA ACCESS DENIED",
"warning"
);

}

}

/* =========================================================
MOVEABLE CAMERA
========================================================= */

const camWindow =
document.getElementById("camWindow");

let dragging = false;

let offsetX = 0;
let offsetY = 0;

camWindow.addEventListener("mousedown",(e)=>{

dragging = true;

offsetX =
e.clientX -
camWindow.offsetLeft;

offsetY =
e.clientY -
camWindow.offsetTop;

});

document.addEventListener("mousemove",(e)=>{

if(!dragging) return;

camWindow.style.left =
(e.clientX - offsetX) + "px";

camWindow.style.top =
(e.clientY - offsetY) + "px";

camWindow.style.right = "auto";
camWindow.style.bottom = "auto";

});

document.addEventListener("mouseup",()=>{

dragging = false;

});

/* =========================================================
GLITCHES
========================================================= */

const glitch =
document.querySelector(".glitch");

setInterval(()=>{

glitch.style.opacity = ".05";

setTimeout(()=>{

glitch.style.opacity = "0";

},120);

},Math.random()*7000+3000);

/* =========================================================
RANDOM WARNINGS
========================================================= */

const warnings = [

"unknown movement detected",

"signal corruption rising",

"containment breach possible",

"audio distortion detected",

"something entered channel 4"

];

setInterval(()=>{

const w =
warnings[
Math.floor(
Math.random()*warnings.length
)
];

add(
"WARNING: " + w,
"warning"
);

talk(w);

},90000);

/* =========================================================
BOOT
========================================================= */

setTimeout(()=>{

talk(
"EVERDUSK online"
);

},5000);

setTimeout(()=>{

startCamera();

},7000);

</script>

</body>
</html>
