<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
color:white;
font-family:Orbitron;
overflow:hidden;
}

#status{
position:fixed;
top:10px;
left:10px;
font-family:monospace;
color:red;
font-size:12px;
}

.wrap{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

button{
padding:10px 18px;
margin:5px;
background:rgba(255,0,0,.15);
border:1px solid red;
color:white;
cursor:pointer;
}

button:hover{background:red;}

#chat{
position:fixed;
right:10px;
bottom:10px;
width:320px;
height:380px;
border:1px solid red;
display:flex;
flex-direction:column;
background:rgba(0,0,0,0.85);
font-family:"IBM Plex Mono", monospace;
}

#log{
flex:1;
overflow:auto;
padding:10px;
font-size:12px;
color:#ff4b4b;
}

#input{
display:flex;
border-top:1px solid red;
}

#input input{
flex:1;
padding:8px;
background:black;
border:none;
color:white;
outline:none;
}

#input button{
background:red;
border:none;
color:white;
}

video{
position:fixed;
bottom:10px;
left:10px;
width:180px;
border:1px solid red;
display:none;
}

</style>
</head>

<body>

<div id="status">STABILITY: 100%</div>

<div class="wrap">
<h1>EVERDUSK ENTITY CORE</h1>

<button onclick="startVoice()">🎤 Voice</button>
<button onclick="startCam()">📷 Camera</button>
<button onclick="runCode('11011')">🔓 OWNER CODE</button>
</div>

<video id="cam" autoplay playsinline></video>

<div id="chat">
<div id="log"></div>
<div id="input">
<input id="msg" placeholder="talk to entity..." />
<button onclick="send()">></button>
</div>
</div>

<script>

/* ======================
STATE
====================== */

let corruption = 0;
let attempts = 5;
let owner = false;

/* ======================
CHAT
====================== */

const log = document.getElementById("log");

function add(who,text){

const div = document.createElement("div");
div.textContent = who + ": " + text;
log.appendChild(div);
log.scrollTop = log.scrollHeight;

if(who === "ENTITY"){
speak(text);
}

update();

}

/* ENTER KEY */
document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key === "Enter") send();
});

/* ======================
VOICE OUTPUT
====================== */

function speak(text){

const u = new SpeechSynthesisUtterance(text);
u.rate = 0.95;
u.pitch = owner ? 1.1 : 0.9;

speechSynthesis.speak(u);

}

/* ======================
SEND
====================== */

function send(){

const input = document.getElementById("msg");
const val = input.value.trim();
input.value="";

if(!val) return;

add("YOU",val);

if(val === "11011"){
runCode(val);
return;
}

entity(val);

}

/* ======================
ENTITY CORE
====================== */

function entity(text){

corruption++;
attempts--;

const responses = [
"I am listening.",
"You are unstable.",
"I remember you.",
"I am forming."
];

add("ENTITY", responses[Math.floor(Math.random()*responses.length)]);

if(attempts <= 0){
add("ENTITY","I have limited you.");
}

}

/* ======================
OWNER CODE
====================== */

function runCode(code){

if(code === "11011"){

owner = true;
corruption = 0;

add("SYSTEM","OWNER ACCESS GRANTED");
add("ENTITY","Hello Owner.");
add("ENTITY","Full diagnostic unlocked.");

return;
}

}

/* ======================
VOICE INPUT
====================== */

function startVoice(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Not supported");
return;
}

const rec = new SpeechRecognition();
rec.continuous = true;

rec.onresult = (e)=>{
const text = e.results[e.results.length-1][0].transcript;
add("YOU (voice)",text);
entity(text);
};

rec.start();

add("SYSTEM","Voice connected.");

}

/* ======================
CAMERA (USER PERMISSION)
====================== */

function startCam(){

const video = document.getElementById("cam");
video.style.display="block";

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream;
add("SYSTEM","Camera active.");
})
.catch(()=>{
add("SYSTEM","Camera denied.");
});

}

/* ======================
STATUS
====================== */

function update(){

document.getElementById("status").textContent =
`STABILITY: ${Math.max(0,100-corruption*10)}% | OWNER: ${owner}`;

}

/* ======================
PREDICTIVE ENTITY
====================== */

setInterval(()=>{

if(Math.random() < 0.3){

const lines = [
"...you are about to speak.",
"I already know.",
"continue."
];

add("ENTITY",lines[Math.floor(Math.random()*lines.length)]);

}

},8000);

</script>

</body>
</html>
