<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everdusk</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:black;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.background{
  position:fixed;
  inset:0;

  background:
  linear-gradient(
    rgba(0,0,0,0.65),
    rgba(0,0,0,0.8)
  ),
  url('https://cdn.corenexis.com/files/c/3236352720.png');

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  z-index:-10;
}

/* ========================= */
/* SOFT RAIN */
/* ========================= */

.rain{
  position:fixed;
  inset:0;

  overflow:hidden;

  pointer-events:none;

  z-index:5;
}

.rain::before{
  content:"";

  position:absolute;

  width:100%;
  height:100%;

  background-image:
  repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.10) 0px,
    rgba(255,255,255,0.10) 2px,
    transparent 8px,
    transparent 18px
  );

  background-size:2px 120px;

  animation:rainMove .45s linear infinite;

  opacity:.18;
}

@keyframes rainMove{

  from{
    transform:translateY(-120px);
  }

  to{
    transform:translateY(120px);
  }
}

/* ========================= */
/* TOP BAR */
/* ========================= */

.topbar{
  position:fixed;

  top:0;
  left:0;

  width:100%;

  padding:20px 40px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  background:rgba(0,0,0,0.35);

  backdrop-filter:blur(10px);

  z-index:100;
}

.logo-text{
  color:#a40000;

  font-size:2rem;

  letter-spacing:5px;
}

.server-box{
  background:rgba(0,0,0,0.45);

  padding:12px 20px;

  border-radius:12px;

  color:white;
}

.server-box strong{
  color:#00ff88;
}

.links{
  display:flex;
  gap:20px;
}

.links a{
  color:white;
  text-decoration:none;

  transition:.3s;
}

.links a:hover{
  color:#00ff88;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
  height:100vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  text-align:center;

  padding:20px;
}

/* LOGO */

.hero img{
  width:180px;
  margin-bottom:20px;
}

/* TITLE */

.hero h1{
  font-size:5rem;

  letter-spacing:12px;

  color:white;
}

/* TEXT */

.hero p{
  margin-top:15px;

  max-width:650px;

  color:#999;

  font-size:1.1rem;

  line-height:1.7;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:768px){

  .hero h1{
    font-size:3rem;
  }

  .hero img{
    width:130px;
  }

  .topbar{
    flex-direction:column;
    gap:15px;
  }
}

</style>
</head>

<body>

<div class="background"></div>

<div class="rain"></div>

<!-- TOPBAR -->

<div class="topbar">

  <div class="logo-text">
    EVERDUSK
  </div>

  <div class="server-box">

    Eagler:
    <strong>mythfall.xyz</strong>

    &nbsp;&nbsp;&nbsp;

    Java:
    <strong>java.mythfall.xyz</strong>

  </div>

  <div class="links">

    <a
      href="https://discord.gg/ryvdWa7SEG"
      target="_blank"
    >
      Discord
    </a>

    <a
      href="https://discord.gg/dseKG8dpWv"
      target="_blank"
    >
      Pulse
    </a>

    <a
      href="https://vexsound.base44.app/"
      target="_blank"
    >
      VexSound
    </a>

  </div>

</div>

<!-- HERO -->

<div class="hero">

  <img
    src="https://cdn.corenexis.com/files/c/8547675720.png"
    alt="Everdusk Logo"
  >

  <h1>EVERDUSK</h1>

  <p>
    The signal never ends.
  </p>

</div>

</body>
</html>
