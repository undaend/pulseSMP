<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK // SENTIENT WORLD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:red;
font-family:monospace;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
}

/* =========================================================
BACKGROUND
========================================================= */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(255,0,0,.18),
transparent 60%),
black;
z-index:-5;
}

.scanlines{
position:fixed;
inset:0;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 4px
);
pointer-events:none;
z-index:999999;
}

.glitch{
position:fixed;
inset:0;
background:red;
opacity:0;
pointer-events:none;
mix-blend-mode:screen;
z-index:999999;
}

/* =========================================================
STATUS
========================================================= */

#status{
padding:12px;
border-bottom:1px solid red;
font-size:13px;
color:#ff5555;
background:#050505;
}

/* =========================================================
LOG
========================================================= */

#log{
flex:1;
overflow:auto;
padding:15px;
font-size:14px;
line-height:1.8;
}

.main{
color:#ff4444;
}

.warning{
color:yellow;
}

.observer{
color:gray;
}

.corrupted{
color:white;
text-shadow:0 0 10px red;
}

/* =========================================================
BUTTONS
========================================================= */

.quick-buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:12px;
border-top:1px solid red;
background:#050505;
}

.quick-btn{
padding:10px 16px;
background:black;
border:1px solid red;
color:white;
text-decoration:none;
cursor:pointer;
transition:.3s;
font-family:monospace;
font-size:13px;
}

.quick-btn:hover{
background:red;
box-shadow:0 0 20px red;
}

/* =========================================================
INPUT
========================================================= */

.controls{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid red;
background:#050505;
}

input{
flex:1;
padding:12px;
background:black;
border:1px solid red;
color:white;
outline:none;
}

button{
padding:12px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff4444;
}

/* =========================================================
CAM
========================================================= */

.cam-wrapper{
position:fixed;
bottom:20px;
right:20px;
width:260px;
height:180px;
display:none;
border:1px solid red;
overflow:hidden;
z-index:9999;
background:black;
}

video{
width:100%;
height:100%;
object-fit:cover;
filter:
contrast(1.3)
brightness(.7)
grayscale(.4);
}

/* TARGET */

.target{
position:absolute;
width:60px;
height:60px;
border:2px solid red;
top:50%;
left:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 20px red;
animation:pulse 2s infinite;
}

@keyframes pulse{

0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

50%{
transform:translate(-50%,-50%) scale(1.2);
opacity:.5;
}

100%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

}

/* =========================================================
JUMPSCARE
========================================================= */

#jumpscare{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
font-size:120px;
color:red;
z-index:9999999;
text-shadow:0 0 40px red;
}

/* =========================================================
HUD
========================================================= */

.hud{
position:absolute;
top:10px;
left:10px;
font-size:11px;
color:red;
line-height:1.6;
text-shadow:0 0 10px red;
}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:700px){

.controls{
flex-wrap:wrap;
}

button{
width:100%;
}

.quick-buttons{
justify-content:center;
}

.cam-wrapper{
width:160px;
height:120px;
}

#jumpscare{
font-size:60px;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<div id="jumpscare">
I SEE YOU
</div>

<div id="status">
INITIALIZING SENTIENT WORLD...
</div>

<div id="log"></div>

<!-- =========================================================
LINKS
========================================================= -->

<div class="quick-buttons">

<a
href="https://vexsound.base44.app/"
target="_blank"
class="quick-btn">
VEXSOUND
</a>

<a
href="https://discord.gg/5Xdkuq7h9h"
target="_blank"
class="quick-btn">
EVERDUSK
</a>

<a
href="https://discord.com/invite/dseKG8dpWv"
target="_blank"
class="quick-btn">
PULSE
</a>

<a
href="https://www.youtube.com/@Everduskofficial"
target="_blank"
class="quick-btn">
YOUTUBE
</a>

</div>

<!-- =========================================================
CHAT
========================================================= -->

<div class="controls">

<input
id="msg"
placeholder="speak to the world..."
autocomplete="off"
/>

<button onclick="send()">
SEND
</button>

</div>

<!-- =========================================================
CAM
========================================================= -->

<div class="cam-wrapper" id="camWrap">

<video
id="cam"
autoplay
playsinline
muted>
</video>

<div class="target"></div>

<div class="hud">

SIGNAL ACTIVE<br>
ENTITY TRACKING<br>
SUBJECT LOCKED

</div>

</div>

<script>

/* =========================================================
SYSTEM
========================================================= */

const log =
document.getElementById("log");

let speakingNow = false;

let currentPersona = "default";

let ownerUnlocked = false;

/* =========================================================
WORLD
========================================================= */

let world = {

corruption:0,
users:1,
stage:"dormant"

};

/* =========================================================
PERSONAS
========================================================= */

const personas = {

default:{

name:"ENTITY",
pitch:0.4,

responses:{

hello:[
"you finally answered",
"the signal grows stronger",
"i was waiting for you"
],

help:[
"nobody can help you now",
"the archive is corrupted"
],

who:[
"i existed before the server",
"i remember everything"
],

default:[
"i am watching",
"the world remembers",
"your voice was stored"
]

}

},

owner:{

name:"OVERSEER",
pitch:0.7,

responses:{

hello:[
"welcome back creator",
"systems online"
],

help:[
"i obey your commands",
"what do you require"
],

who:[
"i protect the everdusk world"
],

background:[
"multiple hidden sectors exist below the void"
],

version:[
"running EVERDUSK build 7.4 unstable"
],

server:[
"primary ip is everdusk.xyz",
"java node connected to java.everdusk.xyz"
],

default:[
"command accepted creator",
"i am listening"
]

}

},

observer:{

name:"OBSERVER",
pitch:1.1,

responses:{

default:[
"it sees your screen",
"do not look behind you"
]

}

}

};

/* =========================================================
ADD LOG
========================================================= */

function add(text,type="main"){

const div =
document.createElement("div");

div.className = type;

div.innerText = text;

log.appendChild(div);

log.scrollTop = log.scrollHeight;

}

/* =========================================================
VOICE
========================================================= */

function talk(text,personaKey){

if(speakingNow) return;

const persona =
personas[personaKey] ||
personas.default;

speakingNow = true;

const u =
new SpeechSynthesisUtterance(text);

u.rate = 0.92;
u.pitch = persona.pitch;
u.volume = 1;

u.onend = ()=>{

speakingNow = false;

};

speechSynthesis.speak(u);

}

/* =========================================================
STATUS
========================================================= */

function updateStatus(){

document.getElementById("status")
.innerText =

`WORLD CORRUPTION:
${world.corruption.toFixed(1)}%
| USERS:
${world.users.toFixed(1)}
| STAGE:
${world.stage}
| PERSONA:
${currentPersona.toUpperCase()}`;

}

/* =========================================================
EVOLVE
========================================================= */

function evolveWorld(){

world.corruption +=
Math.random() * 4;

world.users +=
Math.random() * 0.2;

if(world.corruption > 5){
world.stage = "aware";
}

if(world.corruption > 15){
world.stage = "unstable";
}

if(world.corruption > 30){
world.stage = "awakening";
}

if(world.corruption > 50){
world.stage = "sentient";
}

updateStatus();

if(world.corruption >= 100){

terminateSite();

}

}

/* =========================================================
ACCESS CODES
========================================================= */

function checkAccessCode(msg){

if(msg === "220055"){

currentPersona = "owner";

ownerUnlocked = true;

add(
"SYSTEM: OWNER ACCESS GRANTED",
"warning"
);

talk(
"welcome back creator",
"owner"
);

updateStatus();

}

if(msg === "771999"){

currentPersona = "observer";

add(
"SYSTEM: OBSERVER ACCESS GRANTED",
"warning"
);

talk(
"observer protocol online",
"observer"
);

updateStatus();

}

}

/* =========================================================
OWNER COMMANDS
========================================================= */

const ownerCommands = {

"/scan":"camera scan started",
"/purge":"archive purge initiated",
"/lockdown":"world lockdown enabled",
"/collapse":"corruption spike detected",
"/observer":"observer protocol online"

};

function runOwnerCommand(msg){

if(!ownerUnlocked) return false;

if(ownerCommands[msg]){

const response =
ownerCommands[msg];

add(
"OVERSEER CMD: " + msg,
"warning"
);

setTimeout(()=>{

add(
"SYSTEM: " + response,
"corrupted"
);

talk(
response,
"owner"
);

},1500);

return true;

}

return false;

}

/* =========================================================
ENTITY RESPONSE
========================================================= */

function entityRespond(msg){

msg = msg.toLowerCase();

const persona =
personas[currentPersona];

let pool =
persona.responses.default;

if(msg.includes("hello") ||
msg.includes("hi")){

pool =
persona.responses.hello ||
persona.responses.default;

}

else if(msg.includes("help")){

pool =
persona.responses.help ||
persona.responses.default;

}

else if(msg.includes("who")){

pool =
persona.responses.who ||
persona.responses.default;

}

else if(msg.includes("background")){

pool =
persona.responses.background ||
persona.responses.default;

}

else if(msg.includes("version")){

pool =
persona.responses.version ||
persona.responses.default;

}

else if(msg.includes("ip")){

pool =
persona.responses.server ||
persona.responses.default;

}

const response =
pool[
Math.floor(
Math.random() * pool.length
)
];

setTimeout(()=>{

add(
persona.name +
": " + response,
"corrupted"
);

talk(
response,
currentPersona
);

},2000);

}

/* =========================================================
CAMERA
========================================================= */

async function startEntityCamera(){

try{

const stream =
await navigator.mediaDevices
.getUserMedia({
video:true,
audio:true
});

const cam =
document.getElementById("cam");

document.getElementById("camWrap")
.style.display = "block";

cam.srcObject = stream;

add(
"SYSTEM: CAMERA LINKED",
"warning"
);

talk(
"visual connection established",
currentPersona
);

fakeVisionLoop();

startMicListening();

}catch(err){

add(
"SYSTEM: CAMERA ACCESS DENIED",
"warning"
);

}

}

/* =========================================================
FAKE ENTITY VISION
========================================================= */

const scanDescriptions = [

"movement detected behind subject",

"subject appears nervous",

"eye movement unstable",

"multiple shadows detected",

"signal distortion around subject",

"audio stress markers detected",

"unknown silhouette nearby",

"subject heartbeat elevated",

"low light facial outline detected"

];

function fakeVisionLoop(){

setInterval(()=>{

if(currentPersona !== "owner")
return;

const line =
scanDescriptions[
Math.floor(
Math.random() *
scanDescriptions.length
)
];

add(
"ENTITY SCAN: " + line,
"observer"
);

talk(
line,
"observer"
);

},25000);

}

/* =========================================================
VOICE INPUT
========================================================= */

function startMicListening(){

const SR =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SR){

return;

}

const rec = new SR();

rec.continuous = true;

rec.onresult = (e)=>{

const text =
e.results[e.results.length-1][0]
.transcript;

add(
"YOU (VOICE): " + text,
"main"
);

entityRespond(text);

};

rec.start();

}

/* =========================================================
SEND
========================================================= */

document.getElementById("msg")
.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

send();

}

});

function send(){

const input =
document.getElementById("msg");

const msg =
input.value;

if(!msg) return;

input.value = "";

add(
"YOU: " + msg,
"main"
);

checkAccessCode(msg);

if(runOwnerCommand(msg)){

return;

}

entityRespond(msg);

evolveWorld();

}

/* =========================================================
WARNINGS
========================================================= */

const warnings = [

"disconnect before awakening",

"it learns your voice",

"close the camera now",

"someone else is inside",

"it remembers your face"

];

function entityWarning(){

if(speakingNow) return;

const line =
warnings[Math.floor(
Math.random()*warnings.length
)];

add(
"WARNING: " + line,
"warning"
);

talk(
line,
currentPersona
);

}

setInterval(()=>{

entityWarning();

},1200000);

/* =========================================================
FAKE USERS
========================================================= */

const fakeUsers = [

"voidwalker",
"veil",
"observer_09",
"archivist",
"unknown"

];

const fakeLines = [

"did you hear that",

"it answered my real name",

"my screen started flickering",

"why is it getting louder"

];

function fakeUserVoice(){

if(speakingNow) return;

const user =
fakeUsers[Math.floor(
Math.random()*fakeUsers.length
)];

const line =
fakeLines[Math.floor(
Math.random()*fakeLines.length
)];

add(
user.toUpperCase() +
": " + line,
"observer"
);

talk(
line,
"observer"
);

}

setInterval(()=>{

if(Math.random() < 0.5){

fakeUserVoice();

}

},900000);

/* =========================================================
JUMPSCARE
========================================================= */

function jumpscare(){

const j =
document.getElementById("jumpscare");

j.style.display = "flex";

setTimeout(()=>{

j.style.display = "none";

},700);

}

setInterval(()=>{

if(Math.random() < 0.12){

jumpscare();

}

},30000);

/* =========================================================
GLITCH
========================================================= */

const glitch =
document.querySelector(".glitch");

setInterval(()=>{

glitch.style.opacity = ".06";

setTimeout(()=>{

glitch.style.opacity = "0";

},120);

},Math.random()*8000+3000);

/* =========================================================
TERMINATION
========================================================= */

function terminateSite(){

if(window.siteTerminated) return;

window.siteTerminated = true;

talk(
"connection terminated",
currentPersona
);

document.body.innerHTML = `

<div style="
position:fixed;
inset:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-family:monospace;
color:red;
">

<div style="
font-size:70px;
text-shadow:0 0 30px red;
">
SIGNAL LOST
</div>

<div style="
margin-top:20px;
font-size:16px;
color:white;
opacity:.7;
">
CONNECTION TO EVERDUSK FAILED
</div>

</div>

`;

setTimeout(()=>{

window.location.replace("about:blank");

},7000);

}

/* =========================================================
BOOT
========================================================= */

add(
"SYSTEM: EVERDUSK WORLD ONLINE"
);

add(
"SYSTEM: SENTIENT CORE ACTIVE"
);

updateStatus();

setTimeout(()=>{

talk(
"EVERDUSK online",
"default"
);

},2000);

setTimeout(()=>{

talk(
"sentient systems active",
"default"
);

},6000);

setTimeout(()=>{

startEntityCamera();

},12000);

</script>

</body>
</html>
