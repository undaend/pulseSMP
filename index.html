<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* ORIGINAL BASE (UNCHANGED) */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
    linear-gradient(to bottom, #050505, #000);
    z-index:-10;
}

.fog{
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    opacity:.06;
    animation:fogMove 50s linear infinite;
    filter:blur(5px);
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

.scanlines{
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.02), transparent 3px);
    pointer-events:none;
    z-index:999;
}

.glitch{
    position:fixed;
    inset:0;
    background:red;
    opacity:0;
    pointer-events:none;
    mix-blend-mode:screen;
    z-index:999999;
}

/* ========================= */
/* LEVEL 3 ADD: VHS SYSTEM */
/* ========================= */

.vhs{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:999998;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.03), transparent 2px);
    mix-blend-mode:overlay;
    animation:vhs 0.12s infinite;
}

@keyframes vhs{
0%{transform:translateX(0);opacity:.2;}
50%{transform:translateX(2px);opacity:.4;}
100%{transform:translateX(-2px);opacity:.2;}
}

/* FACE APPARITION */
#face{
    position:fixed;
    inset:0;
    background:url('https://i.imgur.com/8QfQX5v.png');
    background-size:cover;
    opacity:0;
    z-index:999997;
    pointer-events:none;
    mix-blend-mode:screen;
}

/* AI SPEAK */
#ai{
    position:fixed;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
    color:#ff4d4d;
    text-shadow:0 0 20px red;
    opacity:0;
    z-index:9999999;
}

/* ANTIVIRUS */
#av{
    position:fixed;
    inset:0;
    background:black;
    color:#00ff88;
    font-family:monospace;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    z-index:99999999;
}

.bar{
    width:400px;
    height:6px;
    background:#111;
}

.fill{
    width:0%;
    height:100%;
    background:#00ff88;
}

/* XP BAR */
#xpWrap{
    position:fixed;
    bottom:20px;
    left:20px;
    width:300px;
    height:10px;
    background:#111;
    border:1px solid red;
}

#xp{
    height:100%;
    width:0%;
    background:red;
}

/* ========================= */
/* ORIGINAL UI (UNCHANGED) */
/* ========================= */

.main{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.title{
    font-size:120px;
    text-shadow:0 0 40px red;
}

.btn{
    padding:16px 30px;
    margin:10px;
    background:rgba(255,0,0,.1);
    border:1px solid red;
    color:white;
    cursor:pointer;
}

.cutscene{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999999;
}

.cutscene.active{display:flex;}

.countdown{font-size:160px;}

</style>
</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<!-- LEVEL 3 ADDITIONS -->
<div class="vhs"></div>
<div id="face"></div>
<div id="ai"></div>

<div id="av">
<h1>SCANNING SYSTEM...</h1>
<div class="bar"><div class="fill"></div></div>
</div>

<div id="xpWrap"><div id="xp"></div></div>

<!-- ORIGINAL UI -->
<div class="main">
    <div>
        <h1 class="title">EVERDUSK</h1>

        <button class="btn" onclick="startTransfer('https://play.everdusk.xyz/wasm.html')">ENTER VOID</button>
        <button class="btn" onclick="startTransfer('https://youtube.com')">ARCHIVES</button>
        <button class="btn" onclick="startTransfer('https://discord.gg')">JOIN</button>
    </div>
</div>

<div class="cutscene" id="cutscene">
    <div class="countdown" id="count">10</div>
</div>

<script>

/* ========================= */
/* ORIGINAL GLITCH */
/* ========================= */

setInterval(()=>{
document.querySelector('.glitch').style.opacity=.05;
setTimeout(()=>document.querySelector('.glitch').style.opacity=0,100);
},4000);

/* ========================= */
/* AI SPEAK */
/* ========================= */

const ai=document.getElementById("ai");

function speak(t){
ai.innerText=t;
ai.style.opacity=1;
setTimeout(()=>ai.style.opacity=0,1000);
}

/* ========================= */
/* XP SYSTEM */
/* ========================= */

let xp=0;
setInterval(()=>{
xp+=2;
document.getElementById("xp").style.width=(xp%100)+"%";
},400);

/* ========================= */
/* FACE APPARITION */
/* ========================= */

setInterval(()=>{
if(Math.random()>0.85){
let f=document.getElementById("face");
f.style.opacity=0.7;
setTimeout(()=>f.style.opacity=0,200);
}
},3000);

/* ========================= */
/* ANTIVIRUS BOOT */
/* ========================= */

setTimeout(()=>{
let av=document.getElementById("av");
let fill=document.querySelector(".fill");

av.style.opacity=1;
fill.style.width="100%";

speak("system scan active");

setTimeout(()=>{
av.style.opacity=0;
},4000);

},2000);

/* ========================= */
/* CUTSCENE SYSTEM */
/* ========================= */

function startTransfer(url){

let cut=document.getElementById("cutscene");
let count=10;
let beep=new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");

cut.classList.add("active");

let i=setInterval(()=>{

beep.currentTime=0;
beep.play();

document.body.style.transform="scale(1.01)";
setTimeout(()=>document.body.style.transform="scale(1)",80);

count--;
document.getElementById("count").innerText=count;

if(count<=0){
clearInterval(i);
window.open(url,"_blank");
}

},1000);

}

</script>

</body>
</html>
