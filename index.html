<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* KEEP ORIGINAL STYLE (UNCHANGED) */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
}

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
    linear-gradient(to bottom, #050505, #000);
    z-index:-10;
}

.fog{
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    opacity:.06;
    animation:fogMove 50s linear infinite;
    filter:blur(5px);
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

.scanlines{
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(to bottom,rgba(255,255,255,.02),transparent 3px);
    pointer-events:none;
    z-index:999;
}

.glitch{
    position:fixed;
    inset:0;
    background:red;
    opacity:0;
    pointer-events:none;
    mix-blend-mode:screen;
    z-index:999999;
}

/* ========================= */
/* ORIGINAL CUTSCENE */
/* ========================= */

.cutscene{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999999;
}

.cutscene.active{display:flex;}

.countdown{
    font-size:220px;
    font-weight:900;
}

/* ========================= */
/* ADDED: VHS + CAMERA + DISTORTION */
/* ========================= */

.vhs{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:999998;
    mix-blend-mode:overlay;
    opacity:.25;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,0,0,.05),
        rgba(0,0,0,.05) 2px
    );
    animation:vhsFlicker .15s infinite;
}

@keyframes vhsFlicker{
    0%{transform:translateX(0);}
    50%{transform:translateX(-2px);}
    100%{transform:translateX(2px);}
}

/* CAMERA ZOOM */
.zoom{
    animation:zoomIn 5s ease-in-out forwards;
}

@keyframes zoomIn{
    from{transform:scale(1);}
    to{transform:scale(1.2);}
}

/* FACE APPARITION */
.face{
    position:fixed;
    inset:0;
    background:url('https://i.imgur.com/3ZQ3ZQm.png');
    background-size:cover;
    opacity:0;
    pointer-events:none;
    z-index:999997;
    animation:faceFlick 8s infinite;
}

@keyframes faceFlick{
    0%,100%{opacity:0;}
    50%{opacity:.15;}
}

/* AI SPEAK */
#aiSpeak{
    position:fixed;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    color:red;
    font-size:20px;
    opacity:0;
    z-index:99999999;
}

/* ANTIVIRUS FAKE SCAN */
.antivirus{
    position:fixed;
    inset:0;
    background:black;
    color:lime;
    font-family:monospace;
    padding:40px;
    display:none;
    z-index:999999999;
}

.antivirus.active{display:block;}

</style>
</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<!-- ADDED LAYERS -->
<div class="vhs"></div>
<div class="face"></div>
<div id="aiSpeak"></div>

<!-- ANTIVIRUS -->
<div class="antivirus" id="av">
SYSTEM SCAN INITIATED...<br>
CHECKING MEMORY...<br>
ENTITY DETECTED...<br>
</div>

<!-- CUTSCENE -->
<div class="cutscene" id="cutscene">
<div class="countdown" id="countdown">5</div>
</div>

<script>

/* ========================= */
/* ORIGINAL GLITCH */
/* ========================= */

setInterval(()=>{
document.querySelector('.glitch').style.opacity=.05;
setTimeout(()=>document.querySelector('.glitch').style.opacity=0,120);
},4000);

/* ========================= */
/* SCREEN TALK SYSTEM */
/* ========================= */

const speakBox=document.getElementById("aiSpeak");

function talk(t){
speakBox.innerText=t;
speakBox.style.opacity=1;
setTimeout(()=>speakBox.style.opacity=0,900);
}

/* ========================= */
/* HEARTBEAT AUDIO (synthetic) */
/* ========================= */

const beat=new AudioContext();
function heartbeat(){
const osc=beat.createOscillator();
const gain=beat.createGain();
osc.frequency.value=60;
gain.gain.value=0.05;
osc.connect(gain);
gain.connect(beat.destination);
osc.start();
osc.stop(beat.currentTime+0.1);
}

/* ========================= */
/* XP SOUND */
/* ========================= */

function xp(){
const s=new Audio("https://www.myinstants.com/media/sounds/xp.mp3");
s.volume=0.3;
s.play();
}

/* ========================= */
/* PATCH ORIGINAL FUNCTION (NO EDIT) */
/* ========================= */

const oldStart=startTransfer;

startTransfer=function(url){

/* fake antivirus */
document.getElementById("av").classList.add("active");

setTimeout(()=>{

document.getElementById("av").classList.remove("active");

cutscene.classList.add("active");

/* CAMERA ZOOM */
document.body.classList.add("zoom");

let count=5;

const interval=setInterval(()=>{

heartbeat();
xp();

talk("SYSTEM CORRUPTION DETECTED");

countdown.innerText=count;

if(count<=0){
clearInterval(interval);

talk("YOU ARE NOW INSIDE");

setTimeout(()=>{
window.open(url,"_blank");
},600);
}

count--;

},1000);

},2000);
};

</script>

</body>
</html>
