<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everdusk</title>

<style>

/* ========================= */
/* RESET */
/* ========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  cursor:none !important;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#050505;
  color:white;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  cursor:none !important;
}

/* ========================= */
/* CUSTOM SCROLLBAR */
/* ========================= */

::-webkit-scrollbar{
  width:12px;
}

::-webkit-scrollbar-track{
  background:black;
}

::-webkit-scrollbar-thumb{
  background:red;
  border-radius:20px;
}

/* ========================= */
/* INTRO */
/* ========================= */

#intro-cutscene{
  position:fixed;
  inset:0;
  background:black;
  z-index:9999999;
  overflow:hidden;
  cursor:none !important;
}

#introVideo{
  width:100%;
  height:100%;
  object-fit:cover;
}

.intro-overlay{
  position:absolute;
  inset:0;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  background:rgba(0,0,0,.55);
}

.intro-overlay h1{
  font-size:6rem;
  letter-spacing:14px;
  text-shadow:0 0 40px red;
}

.intro-overlay p{
  margin-top:20px;
  color:#ccc;
  letter-spacing:5px;
}

/* ========================= */
/* ACCESS TERMINAL */
/* ========================= */

.lock-terminal{
  margin-top:35px;

  width:420px;

  max-width:90%;

  background:
  rgba(0,0,0,.75);

  border:
  1px solid rgba(255,0,0,.3);

  border-radius:18px;

  padding:25px;

  backdrop-filter:blur(12px);

  box-shadow:
  0 0 35px rgba(255,0,0,.18);
}

.lock-terminal-title{

  color:#ff2a2a;

  font-family:monospace;

  letter-spacing:3px;

  margin-bottom:18px;

  text-align:center;
}

.lock-screen-output{

  height:140px;

  overflow-y:auto;

  background:black;

  border:
  1px solid rgba(255,0,0,.18);

  border-radius:14px;

  padding:18px;

  color:#00ff88;

  font-family:monospace;

  line-height:1.8;

  margin-bottom:18px;
}

.lock-input-wrap{

  display:flex;

  gap:12px;

  align-items:center;
}

.lock-input-wrap span{

  color:#ff2a2a;

  font-family:monospace;
}

#accessInput{

  flex:1;

  background:black;

  border:
  1px solid rgba(255,0,0,.2);

  border-radius:12px;

  padding:14px;

  color:#00ff88;

  font-family:monospace;

  outline:none;
}

#unlockBtn{

  padding:14px 20px;

  background:red;

  border:none;

  border-radius:12px;

  color:white;

  transition:.3s;
}

#unlockBtn:hover{

  transform:translateY(-2px);

  box-shadow:
  0 0 20px rgba(255,0,0,.35);
}

.access-denied{

  animation:deniedFlash .3s 3;
}

@keyframes deniedFlash{

  0%{
    transform:translateX(0);
  }

  25%{
    transform:translateX(-6px);
  }

  50%{
    transform:translateX(6px);
  }

  100%{
    transform:translateX(0);
  }
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.background{
  position:fixed;
  inset:0;

  background:
  linear-gradient(
    rgba(0,0,0,.72),
    rgba(0,0,0,.88)
  ),
  url('https://cdn.corenexis.com/files/c/3236352720.png');

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  z-index:-10;
}

/* ========================= */
/* BLOOD MOON */
/* ========================= */

.bloodmoon{
  position:fixed;

  top:120px;
  right:100px;

  width:180px;
  height:180px;

  border-radius:50%;

  background:
  radial-gradient(
    circle,
    #ff2a2a 0%,
    #8b0000 60%,
    rgba(255,0,0,.08) 100%
  );

  box-shadow:
  0 0 80px rgba(255,0,0,.45),
  0 0 140px rgba(255,0,0,.2);

  z-index:-5;

  animation:moonPulse 8s infinite alternate;
}

@keyframes moonPulse{
  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.08);
  }
}

/* ========================= */
/* RAIN */
/* ========================= */

.rain{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:5;
  overflow:hidden;
}

.rain::before{
  content:"";

  position:absolute;
  width:100%;
  height:100%;

  background-image:
  repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.08) 0px,
    rgba(255,255,255,.08) 2px,
    transparent 10px,
    transparent 22px
  );

  background-size:2px 120px;

  animation:rainMove .5s linear infinite;

  opacity:.15;
}

@keyframes rainMove{
  from{
    transform:translateY(-120px);
  }

  to{
    transform:translateY(120px);
  }
}

/* ========================= */
/* LIGHTNING */
/* ========================= */

.lightning{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  z-index:99999;
  pointer-events:none;
  animation:lightningFlash 14s infinite;
}

@keyframes lightningFlash{

  0%,94%,100%{
    opacity:0;
  }

  95%{
    opacity:.14;
  }

  96%{
    opacity:0;
  }

  97%{
    opacity:.08;
  }

  98%{
    opacity:0;
  }
}

/* ========================= */
/* FOG */
/* ========================= */

.floating-fog{
  position:fixed;
  inset:0;

  background:
  radial-gradient(
    circle at 20% 50%,
    rgba(255,0,0,.04),
    transparent 30%
  ),
  radial-gradient(
    circle at 80% 70%,
    rgba(255,255,255,.03),
    transparent 30%
  );

  animation:fogMove 18s infinite alternate;

  z-index:-4;
}

@keyframes fogMove{

  from{
    transform:translateX(-20px);
  }

  to{
    transform:translateX(20px);
  }
}

/* ========================= */
/* SCANLINES */
/* ========================= */

.scanlines{
  position:fixed;
  inset:0;

  background:
  repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.02),
    rgba(255,255,255,.02) 1px,
    transparent 2px,
    transparent 4px
  );

  pointer-events:none;

  z-index:999;
}

/* ========================= */
/* CUSTOM CURSOR */
/* ========================= */

.cursor-glow{
  width:18px;
  height:18px;

  border-radius:50%;

  background:red;

  position:fixed;

  pointer-events:none;

  z-index:999999999;

  box-shadow:
  0 0 20px red,
  0 0 40px red;

  transform:translate(-50%,-50%);
}

/* ========================= */
/* TOPBAR */
/* ========================= */

.topbar{
  position:fixed;

  top:0;
  left:0;

  width:100%;

  padding:20px 40px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  background:rgba(0,0,0,.35);

  backdrop-filter:blur(12px);

  border-bottom:
  1px solid rgba(255,255,255,.06);

  z-index:9999;
}

.logo-text{
  color:#ff2a2a;
  font-size:2rem;
  letter-spacing:5px;
}

.server-box{
  background:
  rgba(255,255,255,.03);

  padding:12px 20px;

  border-radius:14px;

  border:
  1px solid rgba(255,255,255,.05);
}

.server-box strong{
  color:#00ff88;
}

.links{
  display:flex;
  gap:20px;
}

.links a{
  color:white;
  text-decoration:none;
  transition:.3s;
}

.links a:hover{
  color:#ff2a2a;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
  min-height:100vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  text-align:center;

  padding:120px 20px 80px;
}

.hero img{
  width:190px;

  filter:
  drop-shadow(0 0 25px rgba(255,0,0,.45));

  animation:logoFloat 5s infinite ease-in-out;
}

@keyframes logoFloat{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-10px);
  }
}

.hero h1{
  font-size:5rem;

  letter-spacing:12px;

  margin-top:20px;

  text-shadow:
  0 0 30px rgba(255,0,0,.45);
}

.hero p{
  margin-top:20px;

  max-width:700px;

  color:#bbb;

  line-height:1.8;
}

/* ========================= */
/* CURSOR HTML */
/* ========================= */

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro-cutscene">

  <video autoplay muted loop playsinline id="introVideo">

    <source src="https://cdn.coverr.co/videos/coverr-dark-clouds-1560084474706?download=1080p" type="video/mp4">

  </video>

  <div class="intro-overlay">

    <h1>EVERDUSK</h1>

    <p>SECURE ACCESS TERMINAL</p>

    <div class="lock-terminal">

      <div class="lock-terminal-title">

        AUTHORIZATION REQUIRED

      </div>

      <div
        class="lock-screen-output"
        id="lockOutput"
      >

        <div>> EVERDUSK NETWORK DETECTED</div>

        <div>> ACCESS LEVEL: RESTRICTED</div>

        <div>> ENTER SECURITY CODE</div>

        <div>> ONLY AUTHORIZED USERS MAY ENTER</div>

      </div>

      <div class="lock-input-wrap">

        <span>>></span>

        <input
          type="password"
          id="accessInput"
          placeholder="ENTER ACCESS CODE..."
          autocomplete="off"
        >

        <button id="unlockBtn">

          UNLOCK

        </button>

      </div>

    </div>

  </div>

</div>

<!-- EFFECTS -->

<div class="background"></div>

<div class="bloodmoon"></div>

<div class="rain"></div>

<div class="lightning"></div>

<div class="floating-fog"></div>

<div class="scanlines"></div>

<div class="cursor-glow"></div>

<script>

/* CUSTOM CURSOR */

const cursor =
document.querySelector(".cursor-glow");

document.addEventListener("mousemove", e => {

  cursor.style.left =
  e.clientX + "px";

  cursor.style.top =
  e.clientY + "px";

});

/* ACCESS SYSTEM */

const accessInput =
document.getElementById("accessInput");

const unlockBtn =
document.getElementById("unlockBtn");

const intro =
document.getElementById("intro-cutscene");

const lockOutput =
document.getElementById("lockOutput");

function unlockSite(){

  const code =
  accessInput.value.trim();

  const line =
  document.createElement("div");

  line.innerHTML =
  "> ACCESS CODE: " + code;

  lockOutput.appendChild(line);

  if(code === "438542"){

    const granted =
    document.createElement("div");

    granted.innerHTML =
    "> ACCESS GRANTED";

    lockOutput.appendChild(granted);

    setTimeout(() => {

      intro.style.opacity = "0";

      intro.style.transition =
      "1.2s";

      setTimeout(() => {

        intro.style.display = "none";

      },1200);

    },900);

  }

  else{

    const denied =
    document.createElement("div");

    denied.innerHTML =
    "> ACCESS DENIED";

    denied.style.color =
    "#ff2a2a";

    lockOutput.appendChild(denied);

    accessInput.value = "";

    document
    .querySelector(".lock-terminal")
    .classList.add("access-denied");

    setTimeout(() => {

      document
      .querySelector(".lock-terminal")
      .classList.remove("access-denied");

    },900);

  }

  lockOutput.scrollTop =
  lockOutput.scrollHeight;

}

unlockBtn.onclick =
unlockSite;

accessInput
.addEventListener("keydown", e => {

  if(e.key === "Enter"){

    unlockSite();

  }

});

</script>

</body>
</html>
