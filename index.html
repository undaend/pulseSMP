<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK // SENTIENT WORLD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:red;
font-family:monospace;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
}

/* =========================================================
BACKGROUND
========================================================= */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(255,0,0,.18),
transparent 60%),
black;
z-index:-5;
}

.scanlines{
position:fixed;
inset:0;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 4px
);
pointer-events:none;
z-index:999999;
}

.glitch{
position:fixed;
inset:0;
background:red;
opacity:0;
pointer-events:none;
mix-blend-mode:screen;
z-index:999999;
}

/* =========================================================
STATUS
========================================================= */

#status{
padding:12px;
border-bottom:1px solid red;
font-size:13px;
color:#ff5555;
background:#050505;
}

/* =========================================================
LOG
========================================================= */

#log{
flex:1;
overflow:auto;
padding:15px;
font-size:14px;
line-height:1.8;
}

.main{
color:#ff4444;
}

.warning{
color:yellow;
}

.observer{
color:gray;
}

.corrupted{
color:white;
text-shadow:0 0 10px red;
}

/* =========================================================
BUTTONS
========================================================= */

.quick-buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:12px;
border-top:1px solid red;
background:#050505;
}

.quick-btn{
padding:10px 16px;
background:black;
border:1px solid red;
color:white;
text-decoration:none;
cursor:pointer;
transition:.3s;
font-family:monospace;
font-size:13px;
}

.quick-btn:hover{
background:red;
box-shadow:0 0 20px red;
}

/* =========================================================
INPUT
========================================================= */

.controls{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid red;
background:#050505;
}

input{
flex:1;
padding:12px;
background:black;
border:1px solid red;
color:white;
outline:none;
}

button{
padding:12px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff4444;
}

/* =========================================================
CAMERA WINDOW
========================================================= */

.cam-wrapper{

position:fixed;
bottom:20px;
right:20px;

width:320px;
height:220px;

display:none;

border:1px solid red;

overflow:hidden;

z-index:9999;

background:black;

cursor:move;

user-select:none;

resize:both;

min-width:220px;
min-height:160px;

max-width:700px;
max-height:500px;

box-shadow:
0 0 25px rgba(255,0,0,.5);

}

video{
width:100%;
height:100%;
object-fit:cover;

filter:
contrast(1.3)
brightness(.7)
grayscale(.4);
}

/* =========================================================
STATIC
========================================================= */

.static{

position:absolute;
inset:0;

background:
repeating-linear-gradient(
0deg,
rgba(255,255,255,.02),
rgba(255,255,255,.02) 1px,
transparent 1px,
transparent 3px
);

opacity:.2;

pointer-events:none;

}

/* =========================================================
SCAN GRID
========================================================= */

.scan-grid{

position:absolute;
inset:0;

background:

linear-gradient(
rgba(255,0,0,.08) 1px,
transparent 1px
),

linear-gradient(
90deg,
rgba(255,0,0,.08) 1px,
transparent 1px
);

background-size:30px 30px;

pointer-events:none;

}

/* =========================================================
RADAR
========================================================= */

.radar{

position:absolute;

width:400px;
height:400px;

top:50%;
left:50%;

transform:translate(-50%,-50%);

border-radius:50%;

background:
conic-gradient(
from 0deg,
transparent,
rgba(255,0,0,.4),
transparent
);

animation:radarSpin 4s linear infinite;

mix-blend-mode:screen;

opacity:.4;

pointer-events:none;

}

@keyframes radarSpin{

from{
transform:
translate(-50%,-50%)
rotate(0deg);
}

to{
transform:
translate(-50%,-50%)
rotate(360deg);
}

}

/* =========================================================
VHS
========================================================= */

.vhs{

position:absolute;
inset:0;

pointer-events:none;

background:
linear-gradient(
transparent 50%,
rgba(255,255,255,.03) 50%
);

background-size:100% 4px;

mix-blend-mode:screen;

animation:vhsMove .2s infinite;

opacity:.25;

}

@keyframes vhsMove{

0%{
transform:translateX(0);
}

50%{
transform:translateX(-2px);
}

100%{
transform:translateX(2px);
}

}

/* =========================================================
SCAN LINE
========================================================= */

.scan{

position:absolute;
left:0;

width:100%;
height:4px;

background:red;

box-shadow:
0 0 20px red;

animation:scanMove 4s linear infinite;

opacity:.7;

}

@keyframes scanMove{

0%{
top:-10%;
}

100%{
top:110%;
}

}

/* =========================================================
TARGET
========================================================= */

.target{

position:absolute;

width:60px;
height:60px;

border:2px solid red;

top:50%;
left:50%;

transform:translate(-50%,-50%);

box-shadow:0 0 20px red;

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

50%{
transform:translate(-50%,-50%) scale(1.2);
opacity:.5;
}

100%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

}

/* =========================================================
DETECTION BOX
========================================================= */

.detect-box{

position:absolute;

border:2px solid red;

width:90px;
height:90px;

top:40%;
left:35%;

box-shadow:
0 0 20px red;

animation:detectPulse 2s infinite;

}

@keyframes detectPulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.05);
opacity:.5;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* =========================================================
EYE
========================================================= */

.eye{

position:absolute;

width:18px;
height:18px;

border-radius:50%;

background:red;

box-shadow:
0 0 20px red,
0 0 40px red;

animation:eyePulse 2s infinite;

pointer-events:none;

z-index:9999;

}

@keyframes eyePulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.4);
opacity:.5;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* =========================================================
THERMAL + IR
========================================================= */

.thermal video{

filter:
hue-rotate(-40deg)
contrast(2)
brightness(1.2)
saturate(3);

}

.infrared video{

filter:
contrast(2)
brightness(.9)
saturate(0)
sepia(1)
hue-rotate(-20deg);

}

/* =========================================================
HUD
========================================================= */

.hud{

position:absolute;
top:10px;
left:10px;

font-size:11px;

color:red;

line-height:1.6;

text-shadow:0 0 10px red;

}

/* =========================================================
CAMERA BUTTONS
========================================================= */

.cam-controls{

position:absolute;
top:5px;
right:5px;

display:flex;
gap:5px;

z-index:99999;

}

.cam-btn{

width:24px;
height:24px;

border:none;

background:red;
color:white;

cursor:pointer;

font-size:12px;

}

/* =========================================================
THREAT METER
========================================================= */

.threat-meter{

position:absolute;

top:10px;
right:10px;

width:110px;
height:12px;

border:1px solid red;

background:black;

overflow:hidden;

}

.threat-fill{

height:100%;
width:20%;

background:red;

box-shadow:
0 0 20px red;

transition:1s;

}

/* =========================================================
MOTION ALERT
========================================================= */

.motion-alert{

position:absolute;

bottom:5px;
left:5px;

font-size:11px;

color:red;

text-shadow:0 0 10px red;

animation:flicker 1s infinite;

}

.presence{

position:absolute;

bottom:22px;
right:10px;

font-size:11px;

color:red;

text-shadow:
0 0 10px red;

animation:flicker 1s infinite;

}

@keyframes flicker{

0%{opacity:1;}
50%{opacity:.4;}
100%{opacity:1;}

}

/* =========================================================
JUMPSCARE
========================================================= */

#jumpscare{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
font-size:120px;
color:red;
z-index:9999999;
text-shadow:0 0 40px red;
}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:700px){

.controls{
flex-wrap:wrap;
}

button{
width:100%;
}

.quick-buttons{
justify-content:center;
}

.cam-wrapper{
width:200px;
height:140px;
}

#jumpscare{
font-size:60px;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<div id="jumpscare">
I SEE YOU
</div>

<div id="status">
INITIALIZING SENTIENT WORLD...
</div>

<div id="log"></div>

<div class="quick-buttons">

<a
href="https://vexsound.base44.app/"
target="_blank"
class="quick-btn">
VEXSOUND
</a>

<a
href="https://discord.gg/5Xdkuq7h9h"
target="_blank"
class="quick-btn">
EVERDUSK
</a>

<a
href="https://discord.com/invite/dseKG8dpWv"
target="_blank"
class="quick-btn">
PULSE
</a>

<a
href="https://www.youtube.com/@Everduskofficial"
target="_blank"
class="quick-btn">
YOUTUBE
</a>

</div>

<div class="controls">

<input
id="msg"
placeholder="speak to the world..."
autocomplete="off"
/>

<button onclick="send()">
SEND
</button>

</div>

<!-- =========================================================
CAMERA
========================================================= -->

<div class="cam-wrapper" id="camWrap">

<div class="cam-controls">

<button
class="cam-btn"
onclick="toggleMinimize()">
—
</button>

<button
class="cam-btn"
onclick="toggleThermal()">
T
</button>

<button
class="cam-btn"
onclick="toggleInfrared()">
IR
</button>

</div>

<video
id="cam"
autoplay
playsinline
muted>
</video>

<div class="static"></div>

<div class="scan-grid"></div>

<div class="radar"></div>

<div class="vhs"></div>

<div class="scan"></div>

<div class="detect-box" id="detectBox"></div>

<div class="target"></div>

<div class="eye" id="eye"></div>

<div class="hud">

SIGNAL ACTIVE<br>
ENTITY TRACKING<br>
SUBJECT LOCKED

</div>

<div class="threat-meter">
<div
class="threat-fill"
id="threatFill">
</div>
</div>

<div
class="motion-alert"
id="motionAlert">
MOTION STABLE
</div>

<div
class="presence"
id="presenceAlert">
NO UNKNOWN PRESENCE
</div>

</div>

<script>

/* =========================================================
SYSTEM
========================================================= */

const log =
document.getElementById("log");

let speakingNow = false;

function add(text,type="main"){

const div =
document.createElement("div");

div.className = type;

div.innerText = text;

log.appendChild(div);

log.scrollTop = log.scrollHeight;

}

function talk(text){

if(speakingNow) return;

speakingNow = true;

const u =
new SpeechSynthesisUtterance(text);

u.rate = 0.92;
u.pitch = 0.6;
u.volume = 1;

u.onend = ()=>{

speakingNow = false;

};

speechSynthesis.speak(u);

}

/* =========================================================
SEND
========================================================= */

document.getElementById("msg")
.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

send();

}

});

function send(){

const input =
document.getElementById("msg");

const msg =
input.value;

if(!msg) return;

input.value = "";

add(
"YOU: " + msg,
"main"
);

setTimeout(()=>{

const replies = [

"the signal grows stronger",

"something is nearby",

"your voice was stored",

"i can hear the void",

"unknown activity detected"

];

const r =
replies[
Math.floor(
Math.random()*replies.length
)
];

add(
"ENTITY: " + r,
"corrupted"
);

talk(r);

},2000);

}

/* =========================================================
CAMERA
========================================================= */

async function startEntityCamera(){

try{

const stream =
await navigator.mediaDevices
.getUserMedia({
video:true,
audio:true
});

const cam =
document.getElementById("cam");

document.getElementById("camWrap")
.style.display = "block";

cam.srcObject = stream;

add(
"SYSTEM: CAMERA LINKED",
"warning"
);

talk(
"visual connection established"
);

}catch(err){

add(
"SYSTEM: CAMERA ACCESS DENIED",
"warning"
);

}

}

/* =========================================================
DRAG WINDOW
========================================================= */

const camWindow =
document.getElementById("camWrap");

let dragging = false;

let offsetX = 0;
let offsetY = 0;

camWindow.addEventListener("mousedown",(e)=>{

dragging = true;

offsetX =
e.clientX -
camWindow.offsetLeft;

offsetY =
e.clientY -
camWindow.offsetTop;

});

document.addEventListener("mousemove",(e)=>{

if(!dragging) return;

camWindow.style.left =
(e.clientX - offsetX) + "px";

camWindow.style.top =
(e.clientY - offsetY) + "px";

camWindow.style.right = "auto";
camWindow.style.bottom = "auto";

});

document.addEventListener("mouseup",()=>{

dragging = false;

});

/* =========================================================
MINIMIZE
========================================================= */

let minimized = false;

function toggleMinimize(){

const cam =
document.getElementById("camWrap");

if(!minimized){

cam.style.height = "40px";

minimized = true;

}else{

cam.style.height = "220px";

minimized = false;

}

}

/* =========================================================
THERMAL
========================================================= */

let thermal = false;

function toggleThermal(){

const cam =
document.getElementById("camWrap");

thermal = !thermal;

if(thermal){

cam.classList.add("thermal");

}else{

cam.classList.remove("thermal");

}

}

/* =========================================================
INFRARED
========================================================= */

let infrared = false;

function toggleInfrared(){

const cam =
document.getElementById("camWrap");

infrared = !infrared;

if(infrared){

cam.classList.add("infrared");

}else{

cam.classList.remove("infrared");

}

}

/* =========================================================
EYE TRACKER
========================================================= */

const eye =
document.getElementById("eye");

document.addEventListener("mousemove",(e)=>{

eye.style.left =
e.clientX + "px";

eye.style.top =
e.clientY + "px";

});

/* =========================================================
MOTION TRACKER
========================================================= */

const detectBox =
document.getElementById("detectBox");

const motionAlert =
document.getElementById("motionAlert");

setInterval(()=>{

const x =
Math.random() * 60;

const y =
Math.random() * 60;

detectBox.style.left =
x + "%";

detectBox.style.top =
y + "%";

const detected =
Math.random() < 0.5;

if(detected){

motionAlert.innerText =
"MOTION DETECTED";

motionAlert.style.color =
"#ff0000";

}else{

motionAlert.innerText =
"MOTION STABLE";

motionAlert.style.color =
"#ff6666";

}

},2500);

/* =========================================================
THREAT LEVEL
========================================================= */

const threatFill =
document.getElementById("threatFill");

const presence =
document.getElementById("presenceAlert");

setInterval(()=>{

const level =
Math.floor(Math.random() * 100);

threatFill.style.width =
level + "%";

if(level > 70){

presence.innerText =
"UNKNOWN PRESENCE DETECTED";

presence.style.color =
"#ff0000";

add(
"WARNING: unknown presence nearby",
"warning"
);

talk(
"unknown presence detected"
);

}else{

presence.innerText =
"NO UNKNOWN PRESENCE";

presence.style.color =
"#ff6666";

}

},12000);

/* =========================================================
SAFE LOCAL SCANS
========================================================= */

const motionLines = [

"movement detected",

"light fluctuation detected",

"subject motion unstable",

"unknown movement nearby",

"audio spike detected",

"environmental distortion detected",

"shadow movement detected",

"rapid motion identified"

];

function localScan(){

const line =
motionLines[
Math.floor(
Math.random() *
motionLines.length
)
];

add(
"SCAN: " + line,
"observer"
);

talk(line);

}

setInterval(()=>{

if(document.hidden) return;

if(Math.random() < 0.45){

localScan();

}

},30000);

/* =========================================================
VHS GLITCH
========================================================= */

setInterval(()=>{

const cam =
document.getElementById("camWrap");

cam.style.filter =
`
contrast(${1 + Math.random()*0.5})
brightness(${0.8 + Math.random()*0.4})
`;

setTimeout(()=>{

cam.style.filter = "none";

},150);

},6000);

/* =========================================================
GLITCH FLASH
========================================================= */

const glitch =
document.querySelector(".glitch");

setInterval(()=>{

glitch.style.opacity = ".06";

setTimeout(()=>{

glitch.style.opacity = "0";

},120);

},Math.random()*8000+3000);

/* =========================================================
JUMPSCARE
========================================================= */

function jumpscare(){

const j =
document.getElementById("jumpscare");

j.style.display = "flex";

setTimeout(()=>{

j.style.display = "none";

},700);

}

setInterval(()=>{

if(Math.random() < 0.12){

jumpscare();

}

},30000);

/* =========================================================
BOOT
========================================================= */

add(
"SYSTEM: EVERDUSK WORLD ONLINE"
);

add(
"SYSTEM: SENTIENT CORE ACTIVE"
);

setTimeout(()=>{

talk(
"EVERDUSK online"
);

},2000);

setTimeout(()=>{

startEntityCamera();

},5000);

</script>

</body>
</html>
