<style>

/* ========================= */
/* LOADING SCREEN */
/* ========================= */

#loading-screen{

  position:fixed;
  inset:0;

  background:black;

  z-index:999999;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  animation:fadeOut 1.5s ease forwards;

  animation-delay:3s;
}

.loading-logo img{

  width:160px;

  filter:
  drop-shadow(0 0 25px red);

  animation:pulse 2s infinite;
}

#loading-screen h1{

  margin-top:20px;

  letter-spacing:6px;

  color:#ff2a2a;
}

.loading-bar{

  width:300px;
  height:10px;

  background:#111;

  border-radius:20px;

  margin-top:30px;

  overflow:hidden;
}

.loading-fill{

  width:0%;

  height:100%;

  background:red;

  animation:loadBar 3s linear forwards;
}

@keyframes loadBar{

  to{
    width:100%;
  }
}

@keyframes fadeOut{

  to{
    opacity:0;
    visibility:hidden;
  }
}

/* ========================= */
/* EXTRA RED GLOW */
/* ========================= */

.red-glow{

  position:fixed;
  inset:0;

  background:
  radial-gradient(
    circle at center,
    rgba(255,0,0,0.12),
    transparent 60%
  );

  pointer-events:none;

  z-index:-8;

  animation:redPulse 8s infinite;
}

@keyframes redPulse{

  0%{
    opacity:.4;
  }

  50%{
    opacity:.7;
  }

  100%{
    opacity:.4;
  }
}

/* ========================= */
/* EXTRA PARTICLES */
/* ========================= */

.particles{

  position:fixed;
  inset:0;

  overflow:hidden;

  pointer-events:none;

  z-index:2;
}

.particles::before{

  content:"";

  position:absolute;

  width:200%;
  height:200%;

  background-image:
  radial-gradient(
    rgba(255,0,0,0.4) 1px,
    transparent 1px
  );

  background-size:80px 80px;

  animation:particlesMove 35s linear infinite;

  opacity:.3;
}

@keyframes particlesMove{

  from{
    transform:translateY(0);
  }

  to{
    transform:translateY(-400px);
  }
}

/* ========================= */
/* HERO BUTTONS */
/* ========================= */

.hero-buttons{

  display:flex;

  gap:20px;

  margin-top:35px;

  flex-wrap:wrap;

  justify-content:center;
}

.hero-buttons a{

  padding:15px 30px;

  background:
  rgba(120,0,0,0.35);

  border:
  1px solid rgba(255,0,0,0.3);

  border-radius:14px;

  color:white;

  text-decoration:none;

  transition:.35s;
}

.hero-buttons a:hover{

  background:red;

  transform:
  translateY(-5px);

  box-shadow:
  0 0 30px rgba(255,0,0,0.45);
}

/* ========================= */
/* STATS */
/* ========================= */

.stats-section{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));

  gap:25px;

  padding:80px 40px;
}

.stat-card{

  background:
  rgba(0,0,0,0.45);

  border:
  1px solid rgba(255,255,255,0.08);

  border-radius:18px;

  text-align:center;

  padding:40px 20px;

  transition:.35s;
}

.stat-card:hover{

  transform:
  translateY(-8px);

  border-color:red;

  box-shadow:
  0 0 35px rgba(255,0,0,0.25);
}

.stat-card h2{

  font-size:3rem;

  color:#ff2a2a;

  margin-bottom:12px;
}

.stat-card p{

  color:#aaa;

  letter-spacing:2px;
}

/* ========================= */
/* QUOTE */
/* ========================= */

.quote-banner{

  padding:100px 20px;

  text-align:center;
}

.quote-banner h2{

  font-size:2.2rem;

  color:#cfcfcf;

  font-style:italic;

  letter-spacing:3px;

  text-shadow:
  0 0 25px rgba(255,0,0,0.25);
}

</style>
