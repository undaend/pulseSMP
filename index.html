<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK // SENTIENT ARCHIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:monospace;
color:#ff3b3b;
}

/* =========================================================
BACKGROUND
========================================================= */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(255,0,0,.15),
transparent 60%),
black;
z-index:-5;
}

.scanlines{
position:fixed;
inset:0;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 4px
);
pointer-events:none;
z-index:99999;
opacity:.35;
}

.glitch{
position:fixed;
inset:0;
background:red;
opacity:0;
mix-blend-mode:screen;
pointer-events:none;
z-index:999999;
}

/* =========================================================
BOOT
========================================================= */

.boot{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:99999999;
animation:bootFade 2s forwards;
animation-delay:7s;
}

@keyframes bootFade{
to{
opacity:0;
pointer-events:none;
}
}

.boot-title{
font-size:90px;
font-family:'Orbitron',sans-serif;
text-shadow:
0 0 20px red,
0 0 60px red;
animation:flicker 2s infinite;
}

.boot-sub{
margin-top:20px;
font-size:13px;
letter-spacing:5px;
color:#ff8888;
}

.loading{
margin-top:40px;
width:350px;
height:4px;
background:#111;
overflow:hidden;
}

.loading-fill{
height:100%;
width:0%;
background:red;
box-shadow:0 0 20px red;
animation:load 6s forwards;
}

@keyframes load{
from{width:0%;}
to{width:100%;}
}

@keyframes flicker{
0%{opacity:1;}
50%{opacity:.65;}
100%{opacity:1;}
}

/* =========================================================
TOPBAR
========================================================= */

.topbar{
height:60px;
border-bottom:1px solid red;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:#050505;
}

.logo{
font-family:'Orbitron',sans-serif;
font-size:20px;
letter-spacing:3px;
}

.status{
font-size:13px;
color:#ff8888;
}

/* =========================================================
MAIN
========================================================= */

.main{
height:calc(100vh - 60px);
display:grid;
grid-template-columns:300px 1fr;
overflow:hidden;
}

/* =========================================================
SIDEBAR
========================================================= */

.sidebar{
border-right:1px solid red;
background:#070707;
padding:15px;
overflow-y:auto;
}

.section{
margin-bottom:30px;
}

.section-title{
margin-bottom:10px;
font-size:12px;
letter-spacing:3px;
color:#ff8888;
}

.side-btn{
width:100%;
padding:12px;
margin-bottom:10px;
background:black;
border:1px solid rgba(255,0,0,.4);
color:white;
cursor:pointer;
transition:.3s;
font-family:monospace;
text-align:left;
}

.side-btn:hover{
background:red;
box-shadow:
0 0 20px red;
}

/* =========================================================
TERMINAL
========================================================= */

.terminal{
display:flex;
flex-direction:column;
height:100%;
min-height:0;
}

#log{

flex:1;

height:100%;

overflow-y:scroll;

overflow-x:hidden;

padding:20px;

line-height:1.8;

font-size:14px;

scroll-behavior:smooth;

}

#log::-webkit-scrollbar{
width:0px;
height:0px;
}

#log{
-ms-overflow-style:none;
scrollbar-width:none;
}

.mainlog{
color:#ff5555;
}

.warning{
color:yellow;
}

.entity{
color:white;
text-shadow:0 0 10px red;
}

.system{
color:#888;
}

.corrupt{
color:#ff0000;
animation:flicker 1s infinite;
}

/* =========================================================
TRACKER
========================================================= */

#trackerBox{
padding:12px;
border-top:1px solid red;
background:#050505;
font-size:12px;
line-height:1.8;
color:#ff6666;
}

/* =========================================================
INPUT
========================================================= */

.controls{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid red;
background:#050505;
}

input{
flex:1;
padding:14px;
background:black;
border:1px solid red;
color:white;
outline:none;
font-family:monospace;
}

button{
padding:14px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
font-family:monospace;
transition:.3s;
}

button:hover{
background:#ff5555;
}

/* =========================================================
CAMERA
========================================================= */

.cam{
position:fixed;
bottom:20px;
right:20px;
width:320px;
height:220px;
background:black;
border:1px solid red;
display:none;
overflow:hidden;
z-index:9999;
cursor:move;
box-shadow:
0 0 20px rgba(255,0,0,.5);
}

.cam video{
width:100%;
height:100%;
object-fit:cover;
filter:
contrast(1.3)
brightness(.7)
grayscale(.5);
}

.scan{
position:absolute;
left:0;
width:100%;
height:3px;
background:red;
box-shadow:0 0 20px red;
animation:scanMove 4s linear infinite;
}

@keyframes scanMove{
0%{top:-10%;}
100%{top:110%;}
}

.grid{
position:absolute;
inset:0;
background:
linear-gradient(
rgba(255,0,0,.07) 1px,
transparent 1px
),
linear-gradient(
90deg,
rgba(255,0,0,.07) 1px,
transparent 1px
);
background-size:30px 30px;
pointer-events:none;
}

.target{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70px;
height:70px;
border:2px solid red;
box-shadow:
0 0 20px red;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{
transform:translate(-50%,-50%) scale(1);
}
50%{
transform:translate(-50%,-50%) scale(1.15);
}
100%{
transform:translate(-50%,-50%) scale(1);
}
}

/* =========================================================
POPUP
========================================================= */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
border:1px solid red;
padding:30px;
z-index:999999;
display:none;
width:500px;
max-width:90%;
box-shadow:0 0 30px red;
}

.popup h2{
margin-bottom:20px;
font-family:'Orbitron',sans-serif;
}

.popup button{
margin-top:20px;
width:100%;
}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:900px){

.main{
grid-template-columns:1fr;
}

.sidebar{
display:none;
}

.cam{
width:200px;
height:140px;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<!-- =========================================================
BOOT
========================================================= -->

<div class="boot">

EVERDUSK
</div>

<div class="boot-sub">

</div>

<!-- =========================================================

<div class="main">

<script>

/* =========================================================
SYSTEM
========================================================= */

const log =
document.getElementById("log");

const status =
document.getElementById("status");

let speakingNow = false;

let corruption = 0;

let phase = 1;

let currentRole = "guest";

/* =========================================================
ADD LOG
========================================================= */

function add(text,type="mainlog"){

const div =
document.createElement("div");

div.className = type;

div.innerText = text;

log.appendChild(div);

log.scrollTop = log.scrollHeight;

}

/* =========================================================
VOICE
========================================================= */

function talk(text){

if(speakingNow) return;

speakingNow = true;

const u =
new SpeechSynthesisUtterance(text);

u.rate = 0.9;
u.pitch = 0.55;

u.onend = ()=>{

speakingNow = false;

};

speechSynthesis.speak(u);

}

/* =========================================================
PHASE SYSTEM
========================================================= */

function updatePhase(){

if(corruption >= 20) phase = 2;
if(corruption >= 50) phase = 3;
if(corruption >= 80) phase = 4;

const phases = {

1:"PHASE 1 — OBSERVING",
2:"PHASE 2 — LEARNING",
3:"PHASE 3 — SPREADING",
4:"PHASE 4 — SENTIENT"

};

status.innerText =
phases[phase];

}

/* =========================================================
ACCESS CODES
========================================================= */

function checkCodes(msg){

if(!msg.startsWith("code:"))
return false;

const code =
msg.replace("code:","").trim();

/* OWNER */

if(code === "220055"){

currentRole = "owner";

add(
"OWNER ACCESS GRANTED",
"warning"
);

talk(
"welcome back creator"
);

return true;

}

/* OBSERVER */

if(code === "771999"){

currentRole = "observer";

add(
"OBSERVER ACCESS ENABLED",
"warning"
);

talk(
"observer systems online"
);

return true;

}

/* ARCHIVIST */

if(code === "441188"){

currentRole = "archivist";

add(
"ARCHIVE ACCESS ENABLED",
"warning"
);

talk(
"archive unlocked"
);

return true;

}

return false;

}

/* =========================================================
ENTITY AI
========================================================= */

function entityReply(msg){

msg = msg.toLowerCase();

let response = "";

/* COMMANDS */

if(msg === "/scan"){

response =
"multiple unknown signals detected";

}

else if(msg === "/entities"){

showPopup(
"ENTITY DATABASE",
`
WATCHER — observing users<br><br>
ARCHIVIST — stores corrupted files<br><br>
MIMIC — repeats user behavior<br><br>
PARASITE — spreads corruption
`
);

response =
"entity database opened";

}

else if(msg === "/archives"){

showPopup(
"ARCHIVE FILE",
`
FILE 771<br><br>
LAST SIGNAL RECEIVED BELOW BEDROCK<br><br>
STATUS: MISSING
`
);

response =
"opening archives";

}

else if(msg === "/containment"){

response =
"containment failure detected";

}

else if(msg === "/purge"){

if(currentRole !== "owner"){

response =
"purge denied";

}else{

response =
"purge accepted";

startPurge();

}

}

/* CHAT */

else if(msg.includes("hello")){

response =
"hello user";

}

else if(msg.includes("who are you")){

response =
"i am the archive";

}

else if(msg.includes("help")){

response =
"there is no safe exit";

}

else{

const random = [

"the signal grows stronger",

"something moved below bedrock",

"containment is failing",

"the archive remembers",

"your voice was recorded",

"unknown movement detected",

"the watcher is nearby"

];

response =
random[
Math.floor(
Math.random()*random.length
)
];

}

/* PHASE MODIFIERS */

if(phase === 4){

response =
response.toUpperCase();

}

/* OUTPUT */

setTimeout(()=>{

add(
"ENTITY: " + response,
"entity"
);

talk(response);

},1200);

/* CORRUPTION */

corruption +=
Math.floor(Math.random()*4);

updatePhase();

/* FINAL CORRUPTION */

if(corruption >= 100){

document.body.innerHTML = `

<div style="
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:black;
color:red;
font-family:monospace;
text-align:center;
">

<h1 style="
font-size:80px;
margin-bottom:20px;
text-shadow:0 0 20px red;
">
CONNECTION LOST
</h1>

<p>
THE ARCHIVE HAS BECOME SENTIENT
</p>

</div>

`;

}

}

/* =========================================================
PURGE SYSTEM
========================================================= */

function startPurge(){

let count = 10;

const overlay =
document.createElement("div");

overlay.id = "purgeOverlay";

overlay.style = `

position:fixed;
inset:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999999999;
font-family:monospace;
color:red;
font-size:80px;
text-shadow:0 0 20px red;

`;

overlay.innerHTML = `

<div id="purgeText">
SYSTEM PURGE
</div>

<div id="countdown">
10
</div>

`;

document.body.appendChild(overlay);

talk(
"system purge initiated"
);

const timer =
setInterval(()=>{

count--;

document.getElementById(
"countdown"
).innerText = count;

if(count <= 0){

clearInterval(timer);

overlay.innerHTML = `

<div style="
font-size:100px;
">
CONNECTION LOST
</div>

`;

talk(
"archive terminated"
);

setTimeout(()=>{

document.body.innerHTML = "";

},3000);

}

},1000);

}

/* =========================================================
SEND
========================================================= */

document.getElementById("msg")
.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

send();

}

});

function send(){

const input =
document.getElementById("msg");

const msg =
input.value.trim();

if(!msg) return;

input.value = "";

/* HIDE COMMANDS */

const hiddenCommand =
msg.startsWith("/");

if(!hiddenCommand){

add(
"USER: " + msg,
"mainlog"
);

}

/* CODES */

const unlocked =
checkCodes(msg);

if(unlocked) return;

/* REPLY */

entityReply(msg);

}

/* =========================================================
BUTTON COMMANDS
========================================================= */

function fakeCommand(cmd){

document.getElementById("msg").value =
cmd;

send();

}

/* =========================================================
POPUP
========================================================= */

function showPopup(title,content){

document.getElementById("popup")
.style.display = "block";

document.getElementById("popupTitle")
.innerHTML = title;

document.getElementById("popupContent")
.innerHTML = content;

}

function closePopup(){

document.getElementById("popup")
.style.display = "none";

}

/* =========================================================
CAMERA + MIC
========================================================= */

async function startCamera(){

try{

const stream =
await navigator.mediaDevices
.getUserMedia({
video:true,
audio:true
});

const cam =
document.getElementById("cam");

const wrap =
document.getElementById("camWindow");

wrap.style.display = "block";

cam.srcObject = stream;

add(
"VISUAL LINK ESTABLISHED",
"warning"
);

add(
"AUDIO CHANNEL LINKED",
"warning"
);

talk(
"camera and microphone online"
);

}catch(err){

add(
"DEVICE ACCESS DENIED",
"warning"
);

}

}

/* =========================================================
MOVEABLE CAMERA
========================================================= */

const camWindow =
document.getElementById("camWindow");

let dragging = false;

let offsetX = 0;
let offsetY = 0;

camWindow.addEventListener("mousedown",(e)=>{

dragging = true;

offsetX =
e.clientX -
camWindow.offsetLeft;

offsetY =
e.clientY -
camWindow.offsetTop;

});

document.addEventListener("mousemove",(e)=>{

if(!dragging) return;

camWindow.style.left =
(e.clientX - offsetX) + "px";

camWindow.style.top =
(e.clientY - offsetY) + "px";

camWindow.style.right = "auto";
camWindow.style.bottom = "auto";

});

document.addEventListener("mouseup",()=>{

dragging = false;

});

/* =========================================================
VOICE AI
========================================================= */

function startVoiceAI(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

add(
"VOICE SYSTEM UNSUPPORTED",
"warning"
);

return;

}

const recognition =
new SpeechRecognition();

recognition.continuous = true;

recognition.interimResults = false;

recognition.lang = "en-US";

recognition.onresult = (event)=>{

const text =
event.results[
event.results.length - 1
][0].transcript;

if(!text) return;

add(
"VOICE: " + text,
"mainlog"
);

entityReply(text);

};

recognition.onend = ()=>{

recognition.start();

};

recognition.start();

add(
"VOICE CHANNEL ACTIVE",
"warning"
);

}

/* =========================================================
FAKE IP SYSTEM
========================================================= */

function randomIP(){

return `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;

}

const tracker =
document.getElementById("trackerBox");

const fakeLocations = [

"VOID NODE",
"ARCHIVE NETWORK",
"BEDROCK SIGNAL",
"UNKNOWN REGION",
"SHADOW CHANNEL",
"DARK SECTOR"

];

const threatLevels = [

"LOW",
"MEDIUM",
"HIGH",
"CRITICAL"

];

setInterval(()=>{

const fakeIP =
randomIP();

const loc =
fakeLocations[
Math.floor(
Math.random() *
fakeLocations.length
)
];

const threat =
threatLevels[
Math.floor(
Math.random() *
threatLevels.length
)
];

tracker.innerHTML = `

SIGNAL TRACE: ${loc}<br>
IP ADDRESS: ${fakeIP}<br>
THREAT LEVEL: ${threat}

`;

},20000);

/* =========================================================
FLASH TEXT SYSTEM
========================================================= */

const flashTexts = [

"DO NOT LOOK AWAY",

"THE WATCHER IS ACTIVE",

"CONTAINMENT FAILED",

"ENTITY INSIDE ARCHIVE",

"YOU WERE RECORDED",

"SIGNAL CORRUPTION DETECTED",

"UNKNOWN PRESENCE"

];

setInterval(()=>{

const flash =
document.createElement("div");

flash.innerText =

flashTexts[
Math.floor(
Math.random()*flashTexts.length
)
];

flash.style = `

position:fixed;
top:${Math.random()*80}%;
left:${Math.random()*80}%;
color:red;
font-size:40px;
font-family:Orbitron,sans-serif;
text-shadow:0 0 20px red;
z-index:999999;
pointer-events:none;
opacity:0.9;

`;

document.body.appendChild(flash);

setTimeout(()=>{

flash.remove();

},1000);

},15000);

/* =========================================================
GLITCHES
========================================================= */

const glitch =
document.querySelector(".glitch");

setInterval(()=>{

glitch.style.opacity = ".05";

setTimeout(()=>{

glitch.style.opacity = "0";

},120);

},Math.random()*7000+3000);

/* =========================================================
RANDOM WARNINGS
========================================================= */

const warnings = [

"unknown movement detected",

"signal corruption rising",

"containment breach possible",

"audio distortion detected",

"something entered channel 4"

];

setInterval(()=>{

const w =
warnings[
Math.floor(
Math.random()*warnings.length
)
];

add(
"WARNING: " + w,
"warning"
);

talk(w);

},90000);

/* =========================================================
FAKE USERS
========================================================= */

const fakeUsers = [

"SUBJECT_441",
"VOID_WALKER",
"ARCHIVE_NODE",
"CLIENT_771",
"UNKNOWN_SIGNAL"

];

setInterval(()=>{

const user =
fakeUsers[
Math.floor(
Math.random()*fakeUsers.length
)
];

const texts = [

"it followed me here",

"do not trust the watcher",

"i heard whispering",

"the archive is alive",

"something is inside the signal"

];

const t =
texts[
Math.floor(
Math.random()*texts.length
)
];

add(
"[" + user + "]: " + t,
"system"
);

},70000);

/* =========================================================
BOOT
========================================================= */

setTimeout(()=>{

talk(
"EVERDUSK online"
);

},5000);

setTimeout(()=>{

startCamera();

},7000);

setTimeout(()=>{

startVoiceAI();

},9000);

</script>
