<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* BASE */
/* ========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
overflow:hidden;
color:white;
font-family:'Orbitron',sans-serif;
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
linear-gradient(to bottom, #050505, #000);
z-index:-10;
}

.fog{
position:fixed;
inset:0;
background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
opacity:.06;
filter:blur(5px);
animation:fogMove 50s linear infinite;
z-index:-9;
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

/* ========================= */
/* EFFECTS */
/* ========================= */

.scanlines{
position:fixed;
inset:0;
background:repeating-linear-gradient(to bottom, rgba(255,255,255,.02), transparent 3px);
pointer-events:none;
z-index:999;
}

.glitch{
position:fixed;
inset:0;
background:red;
opacity:0;
mix-blend-mode:screen;
pointer-events:none;
z-index:999999;
}

.vhs{
position:fixed;
inset:0;
opacity:.15;
mix-blend-mode:overlay;
background:repeating-linear-gradient(to bottom, rgba(255,0,0,.05), rgba(0,0,0,.05) 2px);
animation:vhsFlicker .15s infinite;
pointer-events:none;
z-index:999998;
}

@keyframes vhsFlicker{
0%{transform:translateX(0);}
50%{transform:translateX(-2px);}
100%{transform:translateX(2px);}
}

/* ========================= */
/* MAIN UI */
/* ========================= */

.main{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.title{
font-size:110px;
font-weight:900;
text-shadow:0 0 50px red;
}

.buttons{
margin-top:40px;
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:16px 36px;
border:1px solid rgba(255,0,0,.3);
background:rgba(255,0,0,.08);
color:white;
cursor:pointer;
transition:.3s;
}

.btn:hover{
background:red;
transform:scale(1.05);
}

/* ========================= */
/* CUTSCENE */
/* ========================= */

.cutscene{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999999;
}

.cutscene.active{display:flex;}

.ctext{
font-size:16px;
color:red;
font-family:'IBM Plex Mono';
margin-bottom:10px;
opacity:.8;
}

.cnum{
font-size:200px;
font-weight:900;
text-shadow:0 0 60px red;
}

/* ========================= */
/* MEMORY WIPE */
/* ========================= */

.wipe{
position:fixed;
inset:0;
background:black;
opacity:0;
pointer-events:none;
z-index:999999999;
}

.wipe.active{
animation:wipeAnim 1.2s forwards;
}

@keyframes wipeAnim{
0%{opacity:0;}
30%{opacity:1;}
70%{opacity:1;filter:contrast(2);}
100%{opacity:0;}
}

/* ========================= */
/* JUMPSCARE */
/* ========================= */

#scare{
position:fixed;
inset:0;
display:none;
z-index:1000000000;
}

#scare img{
width:100%;
height:100%;
object-fit:cover;
filter:contrast(1.4) brightness(.8);
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>
<div class="vhs"></div>

<section class="main">

<div>

<div class="title">EVERDUSK</div>

<div class="buttons">

<button class="btn" onclick="startTransfer('https://discord.gg/A3GGsc9RM')">DISCORD</button>
<button class="btn" onclick="startTransfer('https://vexsound.base44.app/')">VEXSOUND</button>
<button class="btn" onclick="startTransfer('https://play.everdusk.xyz/wasm.html')">ENTER VOID</button>

</div>

</div>

</section>

<div class="cutscene" id="cutscene">
<div class="ctext" id="ctext">SYSTEM BOOT</div>
<div class="cnum" id="cnum">5</div>
</div>

<div class="wipe" id="wipe"></div>
<div id="scare"></div>

<script>

/* ========================= */
/* ELEMENTS */
/* ========================= */

const cutscene = document.getElementById("cutscene");
const ctext = document.getElementById("ctext");
const cnum = document.getElementById("cnum");
const wipe = document.getElementById("wipe");
const scare = document.getElementById("scare");
const glitch = document.querySelector(".glitch");

/* ========================= */
/* ENTITIES */
/* ========================= */

const images = [
"https://cdn.corenexis.com/files/c/1164486720.webp",
"https://cdn.corenexis.com/files/c/9536946720.jpg",
"https://cdn.corenexis.com/files/c/2912219720.webp"
];

/* ========================= */
/* AUDIO (optional heartbeat) */
/* ========================= */

const ctx = new (window.AudioContext || window.webkitAudioContext)();

function beat(){
const o = ctx.createOscillator();
const g = ctx.createGain();

o.frequency.value = 55;
g.gain.value = 0.06;

o.connect(g);
g.connect(ctx.destination);

o.start();
o.stop(ctx.currentTime + 0.1);
}

document.addEventListener("click",()=>ctx.resume(),{once:true});

/* ========================= */
/* VOICE DISTORTION */
/* ========================= */

function voice(text){
const msg = new SpeechSynthesisUtterance(text);
msg.rate = 1.4;
msg.pitch = 0.1;
speechSynthesis.speak(msg);
}

/* ========================= */
/* GLITCH BURST */
/* ========================= */

function glitchBurst(){
glitch.style.opacity = 0.6;
setTimeout(()=>glitch.style.opacity = 0,120);
}

/* ========================= */
/* MAIN SYSTEM */
/* ========================= */

function startTransfer(url){

let count = 5;

cutscene.classList.add("active");

const messages = [
"INITIALIZING",
"LINK STABLE",
"ENTITY DETECTED",
"MEMORY FAILURE",
"FINAL SEQUENCE"
];

const interval = setInterval(()=>{

beat();

ctext.innerText = messages[5-count];
cnum.innerText = count;

glitchBurst();

if(count === 1){
voice("system failure imminent");
glitchBurst();
}

count--;

if(count < 0){

clearInterval(interval);

/* GLITCH EXPLOSION */
for(let i=0;i<6;i++){
setTimeout(glitchBurst, i*60);
}

/* JUMPSCARE */
const img = images[Math.floor(Math.random()*images.length)];
scare.innerHTML = `<img src="${img}">`;
scare.style.display = "block";

setTimeout(()=>{

scare.style.display = "none";

/* MEMORY WIPE */
wipe.classList.add("active");

/* OPEN LINK */
window.open(url,"_blank");

setTimeout(()=>{

wipe.classList.remove("active");

/* RESET */
cutscene.classList.remove("active");
cnum.innerText = "5";
ctext.innerText = "SYSTEM BOOT";

},1200);

},700);

}

},1000);

}

</script>

</body>
</html>
