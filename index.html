/* =====================================================
DESKTOP
===================================================== */

.desktop-icons{
position:absolute;
top:30px;
left:30px;

display:grid;
grid-template-columns:repeat(2,120px);
gap:28px;

z-index:1000;
}

.desktop-app{
width:110px;
text-align:center;
cursor:pointer;
user-select:none;
transition:.25s;
}

.desktop-app:hover{
transform:scale(1.05);
}

.desktop-app:active{
transform:scale(.95);
}

/* =====================================================
APP ICON
===================================================== */

height:72px;

margin:auto;

rgba(0,0,0,.7)
);

display:flex;
align-items:center;
justify-content:center;

color:#ff4b4b;

0 0 20px rgba(255,0,0,.2),

transition:.3s;
}

.desktop-app:hover .app-icon{

color:white;

0 0 20px red,

DESKTOP BACKGROUND GLOW
===================================================== */

body::before{
content:"";
