=<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ORIGINAL STYLE (UNCHANGED) */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
}

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
    linear-gradient(to bottom, #050505, #000);
    z-index:-10;
}

.fog{
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    opacity:.06;
    animation:fogMove 50s linear infinite;
    filter:blur(5px);
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

.scanlines{
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(to bottom,rgba(255,255,255,.02),transparent 3px);
    pointer-events:none;
    z-index:999;
}

.glitch{
    position:fixed;
    inset:0;
    background:red;
    opacity:0;
    pointer-events:none;
    mix-blend-mode:screen;
    z-index:999999;
}

/* CUTSCENE */

.cutscene{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999999;
}

.cutscene.active{
    display:flex;
}

.countdown{
    font-size:220px;
    font-weight:900;
}

/* JUMPSCARE */

#scare{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:black;
    z-index:1000000000;
}

#scare.active{
    display:flex;
}

#scare img{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<div class="cutscene" id="cutscene">
    <div class="countdown" id="countdown">5</div>
</div>

<div id="scare"></div>

<script>

/* GLITCH */
setInterval(()=>{
document.querySelector('.glitch').style.opacity=.05;
setTimeout(()=>document.querySelector('.glitch').style.opacity=0,120);
},4000);

/* JUMPSCARES */
const jumpscares = [
"https://cdn.corenexis.com/files/c/1164486720.webp",
"https://cdn.corenexis.com/files/c/9536946720.jpg",
"https://cdn.corenexis.com/files/c/2912219720.webp"
];

/* MAIN */
function startTransfer(url){

let count = 5;

const cutscene = document.getElementById("cutscene");
const countdown = document.getElementById("countdown");
const scare = document.getElementById("scare");

cutscene.classList.add("active");

const interval = setInterval(()=>{

countdown.innerText = count;
count--;

if(count < 0){
clearInterval(interval);

/* GLITCH BURST */
for(let i=0;i<6;i++){
setTimeout(()=>{
const g=document.querySelector(".glitch");
g.style.opacity=.7;
setTimeout(()=>g.style.opacity=0,80);
},i*60);
}

/* JUMPSCARE */
const img = jumpscares[Math.floor(Math.random()*jumpscares.length)];

scare.innerHTML = `<img src="${img}">`;
scare.classList.add("active");

/* HOLD + OPEN */
setTimeout(()=>{

scare.classList.remove("active");

window.open(url,"_blank");

setTimeout(()=>{
cutscene.classList.remove("active");
countdown.innerText="5";
},400);

},1200);

}

},1000);

}

</script>

</body>
</html>
