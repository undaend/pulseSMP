<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* RESET */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
    linear-gradient(to bottom, #050505, #000);
    z-index:-10;
}

.fog{
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    opacity:.06;
    animation:fogMove 50s linear infinite;
    filter:blur(5px);
}

@keyframes fogMove{

0%{
    transform:scale(1.1) translateX(0);
}

50%{
    transform:scale(1.2) translateX(-60px);
}

100%{
    transform:scale(1.1) translateX(0);
}

}

.scanlines{
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02),
        rgba(255,255,255,.02) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
    z-index:999;
}

/* ========================= */
/* BOOT SCREEN */
/* ========================= */

.boot-screen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:99999;
    animation:fadeOut 2s forwards;
    animation-delay:5s;
}

.boot-title{
    font-size:90px;
    font-weight:900;
    text-shadow:
        0 0 10px red,
        0 0 40px red,
        0 0 80px red;
    animation:glitchText 2s infinite;
}

.boot-sub{
    margin-top:20px;
    color:#ff2b2b;
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:4px;
}

.loading-bar{
    width:400px;
    height:4px;
    background:#111;
    margin-top:40px;
    overflow:hidden;
    position:relative;
}

.loading-fill{
    position:absolute;
    inset:0;
    width:0%;
    background:red;
    box-shadow:0 0 20px red;
    animation:load 4s forwards;
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}

@keyframes fadeOut{
    to{
        opacity:0;
        pointer-events:none;
    }
}

@keyframes glitchText{

0%{transform:translateX(0);}
20%{transform:translateX(-3px);}
40%{transform:translateX(3px);}
60%{transform:translateX(-2px);}
80%{transform:translateX(2px);}
100%{transform:translateX(0);}

}

/* ========================= */
/* MAIN */
/* ========================= */

.main{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.content{
    max-width:1200px;
    padding:20px;
}

.small{
    color:#ff2b2b;
    letter-spacing:8px;
    margin-bottom:20px;
}

.title{
    font-size:120px;
    font-weight:900;
    line-height:1;
    margin-bottom:30px;
    text-shadow:
        0 0 10px red,
        0 0 40px red,
        0 0 100px red;
}

.desc{
    max-width:700px;
    margin:auto;
    color:#999;
    line-height:1.8;
    margin-bottom:50px;
    font-family:'IBM Plex Mono',monospace;
}

/* ========================= */
/* BUTTONS */
/* ========================= */

.buttons{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    padding:18px 40px;
    text-decoration:none;
    color:white;
    border:1px solid rgba(255,0,0,.3);
    background:rgba(255,0,0,.08);
    backdrop-filter:blur(10px);
    transition:.35s;
    letter-spacing:2px;
    cursor:pointer;
    font-family:'Orbitron',sans-serif;
}

.btn:hover{
    transform:translateY(-4px);
    background:red;
    box-shadow:
        0 0 20px red,
        0 0 60px red;
}

/* ========================= */
/* GAME */
/* ========================= */

.game-frame{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:none;
    display:none;
    z-index:9000;
    background:black;
}

/* ========================= */
/* TOP BAR */
/* ========================= */

.client-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:80px;
    pointer-events:none;
    z-index:100000;
}

.client-topbar{
    width:100%;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,.85),
        transparent
    );
    backdrop-filter:blur(10px);
}

.client-logo{
    color:#ff2b2b;
    letter-spacing:4px;
    font-size:14px;
    text-shadow:0 0 10px red;
}

.client-status{
    color:#ff4d4d;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    animation:pulseStatus 2s infinite;
}

@keyframes pulseStatus{

0%{opacity:.4;}
50%{opacity:1;}
100%{opacity:.4;}

}

/* ========================= */
/* TOP BUTTONS */
/* ========================= */

.top-buttons{
    display:flex;
    gap:12px;
    pointer-events:auto;
}

.top-btn{
    padding:10px 18px;
    background:rgba(255,0,0,.12);
    border:1px solid rgba(255,0,0,.35);
    color:white;
    text-decoration:none;
    font-size:12px;
    letter-spacing:2px;
    cursor:pointer;
    transition:.25s;
    backdrop-filter:blur(8px);
    font-family:'Orbitron',sans-serif;
}

.top-btn:hover{
    background:red;
    box-shadow:
        0 0 12px red,
        0 0 30px red;
    transform:translateY(-2px);
}

/* ========================= */
/* GLITCH */
/* ========================= */

.glitch{
    position:fixed;
    inset:0;
    background:red;
    opacity:0;
    pointer-events:none;
    mix-blend-mode:screen;
    z-index:999999;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:900px){

.title{
    font-size:60px;
}

.boot-title{
    font-size:50px;
}

.buttons{
    flex-direction:column;
}

.client-topbar{
    flex-direction:column;
    gap:12px;
}

.top-buttons{
    flex-wrap:wrap;
    justify-content:center;
}

}

</style>
</head>
<body>

<!-- ========================= -->
<!-- BACKGROUND -->
<!-- ========================= -->

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<!-- ========================= -->
<!-- BOOT SCREEN -->
<!-- ========================= -->

<div class="boot-screen">

<div class="boot-title">
EVERDUSK
</div>

<div class="boot-sub">
INITIALIZING VOID LINK...
</div>

<div class="loading-bar">
<div class="loading-fill"></div>
</div>

</div>

<!-- ========================= -->
<!-- TOP BAR -->
<!-- ========================= -->

<div class="client-overlay">

<div class="client-topbar">

<div class="client-logo">
EVERDUSK
</div>

<div class="top-buttons">

<button class="top-btn" onclick="launchGame()">
PLAY
</button>

<button class="top-btn" onclick="toggleFullscreen()">
FULLSCREEN
</button>

<button class="top-btn" onclick="closeGame()">
EXIT
</button>

<a href="https://discord.gg/5Xdkuq7h9h" class="top-btn" target="_blank">
DISCORD
</a>

</div>

<div class="client-status">
SIGNAL ACTIVE
</div>

</div>

</div>

<!-- ========================= -->
<!-- MAIN -->
<!-- ========================= -->

<section class="main">

<div class="content">

<div class="small">
THE WORLD NEVER SLEEPS
</div>

<h1 class="title">
EVERDUSK
</h1>

<p class="desc">
WARNING: SIGNAL INSTABILITY DETECTED.
UNKNOWN ENTITIES HAVE BEEN TRACKED INSIDE THE ARCHIVE.
CONTINUING MAY RESULT IN MEMORY LOSS.
</p>

<div class="buttons">

<button class="btn" onclick="launchGame()">
ENTER THE VOID
</button>

<a href="https://www.youtube.com/@Everduskofficial" class="btn" target="_blank">
WATCH ARCHIVES
</a>

<a href="https://discord.gg/5Xdkuq7h9h" class="btn" target="_blank">
JOIN EVERDUSK
</a>

<a href="https://vexsound.base44.app/" class="btn" target="_blank">
VEXSOUND
</a>

</div>

</div>

</section>

<!-- ========================= -->
<!-- GAME IFRAME -->
<!-- ========================= -->

<iframe
class="game-frame"
id="gameFrame"
src=""
allowfullscreen
allow="fullscreen; autoplay; clipboard-read; clipboard-write; pointer-lock; gamepad *;"
referrerpolicy="strict-origin-when-cross-origin">
</iframe>

<script>

/* ========================= */
/* GLITCH FLASH */
/* ========================= */

const glitch = document.querySelector('.glitch');

setInterval(() => {

    glitch.style.opacity = '.05';

    setTimeout(() => {
        glitch.style.opacity = '0';
    },100);

},5000);

/* ========================= */
/* LAUNCH GAME */
/* ========================= */

function launchGame(){

    const frame = document.getElementById('gameFrame');

    frame.style.display = 'block';

    if(frame.src === ''){
        frame.src = 'https://play.everdusk.xyz/wasm.html';
    }

}

/* ========================= */
/* FULLSCREEN */
/* ========================= */

function toggleFullscreen(){

    const frame = document.getElementById('gameFrame');

    if(frame.style.display === 'none'){
        launchGame();
    }

    if(!document.fullscreenElement){

        if(frame.requestFullscreen){
            frame.requestFullscreen();
        }
        else if(frame.webkitRequestFullscreen){
            frame.webkitRequestFullscreen();
        }
        else if(frame.msRequestFullscreen){
            frame.msRequestFullscreen();
        }

    }else{

        if(document.exitFullscreen){
            document.exitFullscreen();
        }

    }

}

/* ========================= */
/* CLOSE GAME */
/* ========================= */

function closeGame(){

    const frame = document.getElementById('gameFrame');

    frame.style.display = 'none';

}

/* ========================= */
/* SCREEN FX */
/* ========================= */

setInterval(() => {

    document.body.style.filter =
    'contrast(1.05) brightness(1.02)';

    setTimeout(() => {
        document.body.style.filter = 'none';
    },120);

},9000);

/* ========================= */
/* VERSION */
/* ========================= */

console.log('EVERDUSK CLIENT v4.7.3 VOID BUILD');

</script>

</body>
</html>
