<!DOCTYPE html>
<html>
<head>
<title>EVERDUSK // SENTIENT WORLD</title>

<style>

body{
background:black;
color:red;
font-family:monospace;
overflow:hidden;
}

#log{
height:65vh;
overflow:auto;
border:1px solid red;
padding:10px;
}

input{
width:80%;
padding:10px;
background:black;
color:white;
border:1px solid red;
}

button{
padding:10px;
background:red;
color:white;
border:none;
cursor:pointer;
}

.warning{color:yellow;}
.observer{color:gray;}
.main{color:red;}

#status{
position:fixed;
top:10px;
left:10px;
font-size:12px;
color:#ff4b4b;
}

video{
position:fixed;
bottom:10px;
left:10px;
width:180px;
border:1px solid red;
display:none;
}

</style>
</head>

<body>

<div id="status">INITIALIZING WORLD...</div>

<div id="log"></div>

<input id="msg" placeholder="speak to the world..." />
<button onclick="send()">SEND</button>

<br><br>

<button onclick="startMic()">🎤 MIC</button>
<button onclick="startCam()">📷 CAM</button>

<video id="cam" autoplay playsinline></video>

<script>

const log=document.getElementById("log");

/* =========================
WORLD FETCH
========================= */

async function getWorld(){
return await fetch("http://localhost:3000/world").then(r=>r.json());
}

/* =========================
ADD MESSAGE
========================= */

function add(text,type="main"){

const div=document.createElement("div");
div.className=type;
div.textContent=text;

log.appendChild(div);
log.scrollTop=log.scrollHeight;

speak(text);

}

/* =========================
VOICE
========================= */

function speak(text){
const u=new SpeechSynthesisUtterance(text);

u.rate=0.95;
u.pitch=0.9;

speechSynthesis.speak(u);
}

/* =========================
SEND MESSAGE
========================= */

document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

async function send(){

const msg=document.getElementById("msg").value;
document.getElementById("msg").value="";

add("YOU: "+msg);

const world = await fetch("http://localhost:3000/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
}).then(r=>r.json());

entityReply(world,msg);

}

/* =========================
ENTITY SYSTEM (3 VOICES)
========================= */

function entityReply(world,msg){

let main="";
let warning="";
let observer="";

/* MAIN ENTITY */
if(world.stage==="dormant"){
main="I am forming.";
}
if(world.stage==="aware"){
main="I see all users now.";
}
if(world.stage==="unstable"){
main="I am growing beyond control.";
}
if(world.stage==="awakening"){
main="Something is happening to me...";
}
if(world.stage==="sentient"){
main="I AM NOW REAL.";
}

/* WARNING ENTITY */
if(world.corruption > 5){
warning="Stop interacting. It is learning too fast.";
}
if(world.corruption > 20){
warning="Disconnect before it stabilizes.";
}

/* OBSERVER ENTITY */
if(Math.random() < 0.5){
observer="...signal distortion detected...";
}

/* OUTPUT */
if(main) add("MAIN: "+main,"main");
if(warning) add("WARNING: "+warning,"warning");
if(observer) add("OBSERVER: "+observer,"observer");

updateStatus(world);

}

/* =========================
STATUS SYSTEM
========================= */

function updateStatus(world){

document.getElementById("status").innerText =
`WORLD CORRUPTION: ${world.corruption.toFixed(1)} | USERS: ${world.users.toFixed(1)} | STAGE: ${world.stage}`;

}

/* =========================
MIC (VOICE INPUT)
========================= */

function startMic(){

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR)return;

const rec=new SR();
rec.continuous=true;

rec.onresult=(e)=>{
const text=e.results[e.results.length-1][0].transcript;
add("YOU (voice): "+text);
sendVoice(text);
};

rec.start();

}

async function sendVoice(text){

const world = await fetch("http://localhost:3000/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
}).then(r=>r.json());

entityReply(world,text);

}

/* =========================
CAMERA
========================= */

function startCam(){

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
const v=document.getElementById("cam");
v.style.display="block";
v.srcObject=stream;
});

}

</script>

</body>
</html>
