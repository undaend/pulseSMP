<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* RESET */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.bg{
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at center,
    rgba(255,0,0,.18),
    transparent 60%),

    linear-gradient(to bottom,
    #050505,
    #000);

    z-index:-10;
}

.fog{
    position:fixed;
    inset:0;

    background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');

    background-size:cover;

    opacity:.06;

    animation:fogMove 50s linear infinite;

    filter:blur(5px);
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

.scanlines{
    position:fixed;
    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02),
        rgba(255,255,255,.02) 1px,
        transparent 1px,
        transparent 3px
    );

    pointer-events:none;
    z-index:999;
}

/* ========================= */
/* GLITCH FLASH */
/* ========================= */

.glitch{
    position:fixed;
    inset:0;
    background:red;
    opacity:0;
    pointer-events:none;
    mix-blend-mode:screen;
    z-index:999999;
}

/* ========================= */
/* VHS MODE (ADDED) */
/* ========================= */

.vhs{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:999998;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.03),
        transparent 2px
    );

    mix-blend-mode:overlay;
    animation:vhsFlicker .12s infinite;
}

@keyframes vhsFlicker{
    0%{opacity:.2;transform:translateX(0);}
    50%{opacity:.4;transform:translateX(2px);}
    100%{opacity:.2;transform:translateX(-2px);}
}

/* ========================= */
/* FACE APPARITION (ADDED) */
/* ========================= */

#faceOverlay{
    position:fixed;
    inset:0;
    z-index:999997;
    pointer-events:none;
    opacity:0;

    background:url('https://i.imgur.com/8QfQX5v.png');
    background-size:cover;
    mix-blend-mode:screen;
    filter:contrast(2) brightness(.7);
}

/* ========================= */
/* AI SPEAK (ADDED) */
/* ========================= */

#aiSpeak{
    position:fixed;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
    color:#ff4d4d;
    text-shadow:0 0 20px red;
    opacity:0;
    z-index:9999999;
    pointer-events:none;
}

/* ========================= */
/* ANTIVIRUS SCAN (ADDED) */
/* ========================= */

#antivirus{
    position:fixed;
    inset:0;
    background:black;
    color:#00ff88;
    font-family:monospace;
    z-index:99999999;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
    opacity:0;
    pointer-events:none;
}

.scanbar{
    width:400px;
    height:6px;
    background:#111;
    overflow:hidden;
}

.scanfill{
    height:100%;
    width:0%;
    background:#00ff88;
    transition:3s;
}

/* ========================= */
/* XP BAR (ADDED) */
/* ========================= */

#xpBarContainer{
    position:fixed;
    bottom:20px;
    left:20px;
    width:300px;
    height:10px;
    background:#111;
    border:1px solid #ff2b2b;
    z-index:999999;
}

#xpBar{
    height:100%;
    width:0%;
    background:red;
    box-shadow:0 0 10px red;
    transition:0.2s;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<!-- ADDED SYSTEMS -->
<div class="vhs"></div>
<div id="faceOverlay"></div>
<div id="aiSpeak"></div>

<div id="antivirus">
    <h1>SCANNING SYSTEM FILES...</h1>
    <div class="scanbar"><div class="scanfill"></div></div>
</div>

<div id="xpBarContainer"><div id="xpBar"></div></div>

<!-- YOUR ORIGINAL UI (UNCHANGED) -->

<section class="main">

<div class="content">

<div class="small">THE WORLD NEVER SLEEPS</div>

<h1 class="title">EVERDUSK</h1>

<p class="desc">
WARNING: SIGNAL INSTABILITY DETECTED.
UNKNOWN ENTITIES HAVE BEEN TRACKED INSIDE THE ARCHIVE.
CONTINUING MAY RESULT IN MEMORY LOSS.
</p>

<div class="buttons">

<button class="btn" onclick="startTransfer('https://play.everdusk.xyz/wasm.html')">ENTER THE VOID</button>
<button class="btn" onclick="startTransfer('https://www.youtube.com/@Everduskofficial')">WATCH ARCHIVES</button>
<button class="btn" onclick="startTransfer('https://discord.gg/5Xdkuq7h9h')">JOIN EVERDUSK</button>
<button class="btn" onclick="startTransfer('https://vexsound.base44.app/')">VEXSOUND</button>

</div>

</div>

</section>

<script>

/* ========================= */
/* ORIGINAL GLITCH */
/* ========================= */

setInterval(()=>{
document.querySelector('.glitch').style.opacity=".05";
setTimeout(()=>document.querySelector('.glitch').style.opacity="0",120);
},5000);

/* ========================= */
/* SCREEN TALK SYSTEM (ADDED) */
/* ========================= */

const ai = document.getElementById("aiSpeak");

function speak(text){
ai.innerText = text;
ai.style.opacity = 1;
setTimeout(()=>ai.style.opacity=0,1200);
}

/* ========================= */
/* XP SYSTEM (ADDED) */
/* ========================= */

let xp = 0;
setInterval(()=>{
xp += Math.random()*3;
document.getElementById("xpBar").style.width = (xp%100)+"%";
},600);

/* ========================= */
/* FACE APPARITION (ADDED) */
/* ========================= */

setInterval(()=>{
const face = document.getElementById("faceOverlay");
if(Math.random()>0.85){
face.style.opacity="0.7";
setTimeout(()=>face.style.opacity="0",200);
}
},4000);

/* ========================= */
/* VHS CAMERA SHAKE */
/* ========================= */

setInterval(()=>{
document.body.style.transform="scale(1.002)";
setTimeout(()=>document.body.style.transform="scale(1)",80);
},3000);

/* ========================= */
/* ANTIVIRUS BOOT SCAN (ADDED) */
/* ========================= */

function runScan(){
const av = document.getElementById("antivirus");
const fill = document.querySelector(".scanfill");

av.style.opacity="1";
fill.style.width="100%";

speak("system scan initiated...");

setTimeout(()=>{
speak("threat detected: ENTITY SIGNAL");
},2000);

setTimeout(()=>{
av.style.opacity="0";
fill.style.width="0%";
},5000);
}

setTimeout(runScan,2000);

/* ========================= */
/* CUTSCENE CORE */
/* ========================= */

function startTransfer(url){

speak("DO NOT CONTINUE");

let count = 10;
const beep = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");

const interval = setInterval(()=>{

document.body.style.transform="scale(1.01)";

setTimeout(()=>document.body.style.transform="scale(1)",80);

beep.currentTime=0;
beep.play();

count--;

if(count<=0){
clearInterval(interval);
window.open(url,"_blank");
}

},1000);

}

/* ========================= */
/* ENTITY GOD MODE EFFECTS */
/* ========================= */

setInterval(()=>{
document.body.style.filter="contrast(1.1) saturate(1.2)";
setTimeout(()=>document.body.style.filter="none",120);
},7000);

</script>

</body>
</html>
