<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everdusk</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:black;
  font-family:Arial,sans-serif;
  color:white;
  cursor:none;
}

/* ========================= */
/* DARK BACKGROUND */
/* ========================= */

.background{
  position:fixed;
  inset:0;

  background:
  radial-gradient(
    circle,
    rgba(20,20,20,0.4),
    rgba(0,0,0,1)
  );

  z-index:-10;
}

/* ========================= */
/* OLD TV STATIC */
/* ========================= */

.static{
  position:fixed;
  inset:0;

  background-image:
  repeating-radial-gradient(
    circle at center,
    rgba(255,255,255,0.02) 0px,
    rgba(0,0,0,0.05) 2px,
    transparent 4px
  );

  opacity:.12;

  animation:staticMove .2s infinite;

  z-index:-8;

  pointer-events:none;
}

@keyframes staticMove{

  0%{
    transform:translate(0,0);
  }

  25%{
    transform:translate(-2px,2px);
  }

  50%{
    transform:translate(2px,-2px);
  }

  75%{
    transform:translate(1px,1px);
  }

  100%{
    transform:translate(0,0);
  }
}

/* ========================= */
/* CRT SCANLINES */
/* ========================= */

.scanlines{
  position:fixed;
  inset:0;

  background:
  repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.02) 1px,
    transparent 2px,
    transparent 4px
  );

  z-index:-7;

  pointer-events:none;
}

/* ========================= */
/* RAIN */
/* ========================= */

.rain{
  position:fixed;
  inset:0;

  overflow:hidden;

  pointer-events:none;

  z-index:5;
}

.rain::before{
  content:"";

  position:absolute;

  inset:-200px;

  background-image:
  linear-gradient(
    transparent,
    rgba(255,255,255,0.55)
  );

  background-size:3px 140px;

  transform:rotate(15deg) scale(1.7);

  animation:rain .18s linear infinite;

  opacity:.55;
}

.rain::after{
  content:"";

  position:absolute;

  inset:-200px;

  background-image:
  linear-gradient(
    transparent,
    rgba(180,180,180,0.15)
  );

  background-size:4px 180px;

  transform:rotate(14deg) scale(2);

  animation:rain .3s linear infinite;

  opacity:.15;
}

@keyframes rain{

  from{
    background-position:0 0;
  }

  to{
    background-position:-120px 320px;
  }
}

/* ========================= */
/* THUNDER FLASH */
/* ========================= */

.thunder{
  position:fixed;
  inset:0;

  pointer-events:none;

  z-index:9;
}

.thunder::after{
  content:"";

  position:absolute;
  inset:0;

  background:
  rgba(255,255,255,0.04);

  opacity:0;

  animation:flash 12s infinite;
}

@keyframes flash{

  0%{
    opacity:0;
  }

  1%{
    opacity:.08;
  }

  2%{
    opacity:0;
  }

  18%{
    opacity:0;
  }

  19%{
    opacity:.04;
  }

  20%{
    opacity:0;
  }

  100%{
    opacity:0;
  }
}

/* ========================= */
/* CURSOR */
/* ========================= */

.cursor{
  width:18px;
  height:18px;

  border:2px solid white;

  border-radius:50%;

  position:fixed;

  pointer-events:none;

  z-index:99999;

  transform:translate(-50%,-50%);

  box-shadow:
  0 0 15px rgba(255,255,255,0.4);
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
  height:100vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  text-align:center;

  position:relative;

  z-index:100;
}

/* LOGO */

.hero img{
  width:180px;

  margin-bottom:20px;

  filter:
  grayscale(100%)
  brightness(.9)
  drop-shadow(0 0 20px rgba(255,255,255,0.15));

  animation:float 5s ease-in-out infinite;
}

@keyframes float{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-8px);
  }

  100%{
    transform:translateY(0px);
  }
}

/* TITLE */

.hero h1{
  font-size:5rem;

  letter-spacing:12px;

  color:#ddd;

  text-shadow:
  0 0 10px rgba(255,255,255,0.15);

  animation:flicker 5s infinite;
}

@keyframes flicker{

  0%{
    opacity:1;
  }

  2%{
    opacity:.7;
  }

  4%{
    opacity:1;
  }

  50%{
    opacity:.95;
  }

  52%{
    opacity:.6;
  }

  54%{
    opacity:1;
  }

  100%{
    opacity:1;
  }
}

/* TEXT */

.hero p{
  margin-top:15px;

  max-width:650px;

  color:#999;

  font-size:1.1rem;

  line-height:1.7;
}

/* ========================= */
/* BUTTONS */
/* ========================= */

.buttons{
  margin-top:35px;

  display:flex;
  gap:20px;

  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:14px 28px;

  border:1px solid rgba(255,255,255,0.12);

  background:
  rgba(255,255,255,0.04);

  color:white;

  text-decoration:none;

  border-radius:8px;

  transition:.3s;

  backdrop-filter:blur(6px);
}

.btn:hover{
  background:white;
  color:black;

  box-shadow:
  0 0 20px rgba(255,255,255,0.25);
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:768px){

  .hero h1{
    font-size:3rem;
  }

  .hero img{
    width:130px;
  }

  .buttons{
    flex-direction:column;
  }
}

</style>
</head>

<body>

<div class="background"></div>

<div class="static"></div>

<div class="scanlines"></div>

<div class="rain"></div>

<div class="thunder"></div>

<div class="cursor"></div>

<!-- HERO -->

<div class="hero">

  <img
    src="https://cdn.corenexis.com/files/c/8547675720.png"
    alt="Everdusk Logo"
  >

  <h1>EVERDUSK</h1>

  <p>
    The signal never ends.
  </p>

  <div class="buttons">

    <a
      href="https://discord.gg/ryvdWa7SEG"
      target="_blank"
      class="btn"
    >
      Discord
    </a>

    <a
      href="https://discord.gg/dseKG8dpWv"
      target="_blank"
      class="btn"
    >
      Pulse
    </a>

    <a
      href="https://vexsound.base44.app/"
      target="_blank"
      class="btn"
    >
      VexSound
    </a>

  </div>

</div>

<script>

/* CUSTOM CURSOR */

const cursor =
document.querySelector(".cursor");

document.addEventListener(
"mousemove",
e => {

  cursor.style.left =
  e.clientX + "px";

  cursor.style.top =
  e.clientY + "px";
});

</script>

</body>
</html>
