<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everdusk</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:black;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
  height:100vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  text-align:center;

  padding:20px;
}

/* LOGO */

.hero img{
  width:180px;
  margin-bottom:20px;
}

/* TITLE */

.hero h1{
  font-size:5rem;

  letter-spacing:12px;

  color:white;
}

/* TEXT */

.hero p{
  margin-top:15px;

  max-width:650px;

  color:#999;

  font-size:1.1rem;

  line-height:1.7;
}

/* ========================= */
/* BUTTONS */
/* ========================= */

.buttons{
  margin-top:35px;

  display:flex;
  gap:20px;

  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:14px 28px;

  border:1px solid #333;

  background:#111;

  color:white;

  text-decoration:none;

  border-radius:8px;

  transition:.3s;
}

.btn:hover{
  background:white;
  color:black;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:768px){

  .hero h1{
    font-size:3rem;
  }

  .hero img{
    width:130px;
  }

  .buttons{
    flex-direction:column;
  }
}

</style>
</head>

<body>

<div class="hero">

  <img
    src="https://cdn.corenexis.com/files/c/8547675720.png"
    alt="Everdusk Logo"
  >

  <h1>EVERDUSK</h1>

  <p>
    The signal never ends.
  </p>

  <div class="buttons">

    <a
      href="https://discord.gg/ryvdWa7SEG"
      target="_blank"
      class="btn"
    >
      Discord
    </a>

    <a
      href="https://discord.gg/dseKG8dpWv"
      target="_blank"
      class="btn"
    >
      Pulse
    </a>

    <a
      href="https://vexsound.base44.app/"
      target="_blank"
      class="btn"
    >
      VexSound
    </a>

  </div>

</div>

</body>
</html>
