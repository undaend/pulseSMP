<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK // SENTIENT WORLD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:red;
font-family:monospace;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
}

/* =========================================================
BACKGROUND
========================================================= */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(255,0,0,.18),
transparent 60%),
black;
z-index:-5;
}

.scanlines{
position:fixed;
inset:0;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 4px
);
pointer-events:none;
z-index:999999;
}

/* =========================================================
STATUS
========================================================= */

#status{
padding:12px;
border-bottom:1px solid red;
font-size:13px;
color:#ff5555;
background:#050505;
}

/* =========================================================
LOG
========================================================= */

#log{
flex:1;
overflow:auto;
padding:15px;
font-size:14px;
line-height:1.8;
}

.main{
color:#ff4444;
}

.warning{
color:yellow;
}

.corrupted{
color:white;
text-shadow:0 0 10px red;
}

/* =========================================================
BUTTONS
========================================================= */

.quick-buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:12px;
border-top:1px solid red;
background:#050505;
}

.quick-btn{
padding:10px 16px;
background:black;
border:1px solid red;
color:white;
text-decoration:none;
cursor:pointer;
transition:.3s;
font-family:monospace;
font-size:13px;
}

.quick-btn:hover{
background:red;
box-shadow:0 0 20px red;
}

/* =========================================================
INPUT
========================================================= */

.controls{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid red;
background:#050505;
}

input{
flex:1;
padding:12px;
background:black;
border:1px solid red;
color:white;
outline:none;
}

button{
padding:12px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff4444;
}

/* =========================================================
CAMERA WINDOW
========================================================= */

.cam-wrapper{

position:fixed;
bottom:20px;
right:20px;

width:320px;
height:220px;

display:none;

border:1px solid red;

overflow:hidden;

z-index:9999;

background:black;

cursor:move;

user-select:none;

box-shadow:
0 0 25px rgba(255,0,0,.5);

}

video{
width:100%;
height:100%;
object-fit:cover;

filter:
contrast(1.3)
brightness(.7)
grayscale(.4);
}

/* =========================================================
OVERLAYS
========================================================= */

.static{

position:absolute;
inset:0;

background:
repeating-linear-gradient(
0deg,
rgba(255,255,255,.02),
rgba(255,255,255,.02) 1px,
transparent 1px,
transparent 3px
);

opacity:.2;

pointer-events:none;

}

.scan-grid{

position:absolute;
inset:0;

background:

linear-gradient(
rgba(255,0,0,.08) 1px,
transparent 1px
),

linear-gradient(
90deg,
rgba(255,0,0,.08) 1px,
transparent 1px
);

background-size:30px 30px;

pointer-events:none;

}

.scan{

position:absolute;
left:0;

width:100%;
height:4px;

background:red;

box-shadow:
0 0 20px red;

animation:scanMove 4s linear infinite;

opacity:.7;

}

@keyframes scanMove{

0%{
top:-10%;
}

100%{
top:110%;
}

}

.target{

position:absolute;

width:60px;
height:60px;

border:2px solid red;

top:50%;
left:50%;

transform:translate(-50%,-50%);

box-shadow:0 0 20px red;

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

50%{
transform:translate(-50%,-50%) scale(1.2);
opacity:.5;
}

100%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

}

/* =========================================================
HUD
========================================================= */

.hud{

position:absolute;
top:10px;
left:10px;

font-size:11px;

color:red;

line-height:1.6;

text-shadow:0 0 10px red;

}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:700px){

.controls{
flex-wrap:wrap;
}

button{
width:100%;
}

.quick-buttons{
justify-content:center;
}

.cam-wrapper{
width:200px;
height:140px;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="scanlines"></div>

<div id="status">
SYSTEM ONLINE
</div>

<div id="log"></div>

<!-- =========================================================
LINK BUTTONS
========================================================= -->

<div class="quick-buttons">

<a
href="https://vexsound.base44.app/"
target="_blank"
class="quick-btn">
VEXSOUND
</a>

<a
href="https://discord.gg/5Xdkuq7h9h"
target="_blank"
class="quick-btn">
EVERDUSK
</a>

<a
href="https://discord.com/invite/dseKG8dpWv"
target="_blank"
class="quick-btn">
PULSE
</a>

<a
href="https://www.youtube.com/@Everduskofficial"
target="_blank"
class="quick-btn">
YOUTUBE
</a>

</div>

<!-- =========================================================
CHAT
========================================================= -->

<div class="controls">

<input
id="msg"
placeholder="speak to the world..."
autocomplete="off"
/>

<button onclick="send()">
SEND
</button>

</div>

<!-- =========================================================
CAMERA WINDOW
========================================================= -->

<div class="cam-wrapper" id="camWrap">

<video
id="cam"
autoplay
playsinline
muted>
</video>

<div class="static"></div>

<div class="scan-grid"></div>

<div class="scan"></div>

<div class="target"></div>

<div class="hud">

SIGNAL ACTIVE<br>
ENTITY TRACKING<br>
SUBJECT LOCKED

</div>

</div>

<script>

/* =========================================================
SYSTEM
========================================================= */

const log =
document.getElementById("log");

const status =
document.getElementById("status");

let speakingNow = false;

let currentRole = "guest";

let ownerUnlocked = false;

/* =========================================================
ADD LOG
========================================================= */

function add(text,type="main"){

const div =
document.createElement("div");

div.className = type;

div.innerText = text;

log.appendChild(div);

log.scrollTop = log.scrollHeight;

}

/* =========================================================
VOICE
========================================================= */

function talk(text){

if(speakingNow) return;

speakingNow = true;

const u =
new SpeechSynthesisUtterance(text);

u.rate = 0.92;
u.pitch = 0.6;
u.volume = 1;

u.onend = ()=>{

speakingNow = false;

};

speechSynthesis.speak(u);

}

/* =========================================================
ACCESS CODES
========================================================= */

function checkCodes(msg){

/* OWNER */

if(msg === "220055"){

ownerUnlocked = true;

currentRole = "owner";

status.innerText =
"OWNER ACCESS GRANTED";

add(
"SYSTEM: OWNER ACCESS GRANTED",
"warning"
);

talk(
"welcome back creator"
);

return true;

}

/* OBSERVER */

if(msg === "771999"){

currentRole = "observer";

status.innerText =
"OBSERVER ACCESS GRANTED";

add(
"SYSTEM: OBSERVER ACCESS GRANTED",
"warning"
);

talk(
"observer systems online"
);

return true;

}

/* ARCHIVIST */

if(msg === "441188"){

currentRole = "archivist";

status.innerText =
"ARCHIVE ACCESS GRANTED";

add(
"SYSTEM: ARCHIVE ACCESS GRANTED",
"warning"
);

talk(
"archive unlocked"
);

return true;

}

return false;

}

/* =========================================================
ENTITY RESPONSE
========================================================= */

function entityRespond(){

const replies = {

guest:[
"the signal grows stronger",
"something is nearby",
"your voice was stored"
],

owner:[
"command accepted creator",
"systems online",
"all sectors stable"
],

observer:[
"do not trust the shadows",
"something moved behind you",
"the watcher sees everything"
],

archivist:[
"the archive remembers",
"old files were restored",
"hidden records detected"
]

};

const pool =
replies[currentRole] ||
replies.guest;

const response =
pool[
Math.floor(
Math.random()*pool.length
)
];

setTimeout(()=>{

add(
"ENTITY: " + response,
"corrupted"
);

talk(response);

},1500);

}

/* =========================================================
SEND
========================================================= */

document.getElementById("msg")
.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

send();

}

});

function send(){

const input =
document.getElementById("msg");

const msg =
input.value.trim();

if(!msg) return;

input.value = "";

add(
"YOU: " + msg,
"main"
);

/* CHECK CODES */

const unlocked =
checkCodes(msg);

if(unlocked) return;

/* ENTITY REPLY */

entityRespond();

}

/* =========================================================
CAMERA
========================================================= */

async function startEntityCamera(){

try{

const stream =
await navigator.mediaDevices
.getUserMedia({
video:true,
audio:true
});

const cam =
document.getElementById("cam");

const wrap =
document.getElementById("camWrap");

wrap.style.display = "block";

cam.srcObject = stream;

add(
"SYSTEM: CAMERA LINKED",
"warning"
);

talk(
"visual connection established"
);

}catch(err){

add(
"SYSTEM: CAMERA ACCESS DENIED",
"warning"
);

}

}

/* =========================================================
MOVEABLE CAMERA
========================================================= */

const camWindow =
document.getElementById("camWrap");

let dragging = false;

let offsetX = 0;
let offsetY = 0;

camWindow.addEventListener("mousedown",(e)=>{

dragging = true;

offsetX =
e.clientX -
camWindow.offsetLeft;

offsetY =
e.clientY -
camWindow.offsetTop;

});

document.addEventListener("mousemove",(e)=>{

if(!dragging) return;

camWindow.style.left =
(e.clientX - offsetX) + "px";

camWindow.style.top =
(e.clientY - offsetY) + "px";

camWindow.style.right = "auto";

camWindow.style.bottom = "auto";

});

document.addEventListener("mouseup",()=>{

dragging = false;

});

/* =========================================================
BOOT
========================================================= */

add(
"SYSTEM: EVERDUSK WORLD ONLINE"
);

add(
"SYSTEM: SENTIENT CORE ACTIVE"
);

setTimeout(()=>{

talk(
"EVERDUSK online"
);

},2000);

setTimeout(()=>{

startEntityCamera();

},4000);

</script>

</body>
</html>
