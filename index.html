<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* BASE */
/* ========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
overflow:hidden;
color:white;
font-family:'Orbitron',sans-serif;
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
linear-gradient(to bottom, #050505, #000);
z-index:-10;
}

.fog{
position:fixed;
inset:0;
background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
opacity:.06;
filter:blur(5px);
animation:fogMove 50s linear infinite;
z-index:-9;
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

/* ========================= */
/* EFFECTS */
/* ========================= */

.scanlines{
position:fixed;
inset:0;
background:repeating-linear-gradient(to bottom, rgba(255,255,255,.02), transparent 3px);
pointer-events:none;
z-index:999;
}

.glitch{
position:fixed;
inset:0;
background:red;
opacity:0;
mix-blend-mode:screen;
pointer-events:none;
z-index:999999;
}

/* ========================= */
/* MAIN UI */
/* ========================= */

.main{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
z-index:10;
}

.title{
font-size:110px;
font-weight:900;
text-shadow:0 0 50px red;
}

.buttons{
margin-top:40px;
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

/* ========================= */
/* PULSE BUTTONS */
/* ========================= */

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.06);}
100%{transform:scale(1);}
}

.btn{
padding:16px 36px;
border:1px solid rgba(255,0,0,.3);
background:rgba(255,0,0,.08);
color:white;
cursor:pointer;
transition:.3s;
animation:pulse 2s infinite;
}

.btn:hover{
background:red;
transform:scale(1.08);
}

/* ========================= */
/* CUTSCENE */
/* ========================= */

.cutscene{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999999;
}

.cutscene.active{
display:flex;
}

.ctext{
font-size:16px;
color:red;
font-family:'IBM Plex Mono';
margin-bottom:10px;
opacity:.8;
}

.cnum{
font-size:200px;
font-weight:900;
text-shadow:0 0 60px red;
}

/* ========================= */
/* JUMPSCARE */
/* ========================= */

#scare{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:black;
z-index:1000000000;
}

#scare.active{
display:flex;
}

#scare img{
width:100%;
height:100%;
object-fit:cover;
filter:contrast(1.6) brightness(0.7);
animation:shake .08s infinite;
}

@keyframes shake{
0%{transform:translateX(0);}
50%{transform:translateX(-3px);}
100%{transform:translateX(3px);}
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<div class="main">

<div>

<div class="title">EVERDUSK</div>

<div class="buttons">

<button class="btn" onclick="startTransfer('https://discord.gg/A3GGsc9RM',0)">
DISCORD
</button>

<button class="btn" onclick="startTransfer('https://vexsound.base44.app/',1)">
VEXSOUND
</button>

<button class="btn" onclick="startTransfer('https://play.everdusk.xyz/wasm.html',2)">
ENTER VOID
</button>

</div>

</div>

</div>

<div class="cutscene" id="cutscene">
<div class="ctext" id="ctext">SYSTEM BOOT</div>
<div class="cnum" id="cnum">5</div>
</div>

<div id="scare"></div>

<script>

/* ========================= */
/* ELEMENTS */
/* ========================= */

const cutscene = document.getElementById("cutscene");
const ctext = document.getElementById("ctext");
const cnum = document.getElementById("cnum");
const scare = document.getElementById("scare");
const glitch = document.querySelector(".glitch");

/* ========================= */
/* JUMPSCARES PER BUTTON */
/* ========================= */

const jumpscares = [
"https://cdn.corenexis.com/files/c/1164486720.webp",
"https://cdn.corenexis.com/files/c/9536946720.jpg",
"https://cdn.corenexis.com/files/c/2912219720.webp"
];

/* ========================= */
/* GLITCH */
/* ========================= */

function glitchBurst(){
glitch.style.opacity = 0.7;
setTimeout(()=>glitch.style.opacity = 0,120);
}

/* ========================= */
/* MAIN FUNCTION */
/* ========================= */

function startTransfer(url,type){

let count = 5;

cutscene.classList.add("active");

const messages = [
"INITIALIZING",
"LINK STABLE",
"ENTITY DETECTED",
"MEMORY FAILURE",
"FINAL SEQUENCE"
];

const interval = setInterval(()=>{

ctext.innerText = messages[5-count];
cnum.innerText = count;

glitchBurst();

count--;

if(count < 0){

clearInterval(interval);

/* glitch burst */
for(let i=0;i<6;i++){
setTimeout(glitchBurst,i*60);
}

/* jumpscare */
const img = jumpscares[type];

scare.innerHTML = `<img src="${img}">`;
scare.classList.add("active");

/* hold */
setTimeout(()=>{

scare.classList.remove("active");

/* open link */
window.open(url,"_blank");

/* reset */
setTimeout(()=>{

cutscene.classList.remove("active");

cnum.innerText = "5";
ctext.innerText = "SYSTEM BOOT";

},600);

},1200);

}

},1000);

}

</script>

</body>
</html>
