<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK // SENTIENT WORLD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:red;
font-family:monospace;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
}

/* =========================================================
BACKGROUND
========================================================= */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(255,0,0,.18),
transparent 60%),
black;
z-index:-5;
}

.scanlines{
position:fixed;
inset:0;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 4px
);
pointer-events:none;
z-index:999999;
}

.glitch{
position:fixed;
inset:0;
background:red;
opacity:0;
pointer-events:none;
mix-blend-mode:screen;
z-index:999999;
}

/* =========================================================
STATUS
========================================================= */

#status{
padding:12px;
border-bottom:1px solid red;
font-size:13px;
color:#ff5555;
background:#050505;
}

/* =========================================================
LOG
========================================================= */

#log{
flex:1;
overflow:auto;
padding:15px;
font-size:14px;
line-height:1.8;
}

.main{
color:#ff4444;
}

.warning{
color:yellow;
}

.observer{
color:gray;
}

.corrupted{
color:white;
text-shadow:0 0 10px red;
}

/* =========================================================
BUTTONS
========================================================= */

.quick-buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:12px;
border-top:1px solid red;
background:#050505;
}

.quick-btn{
padding:10px 16px;
background:black;
border:1px solid red;
color:white;
text-decoration:none;
cursor:pointer;
transition:.3s;
font-family:monospace;
font-size:13px;
}

.quick-btn:hover{
background:red;
box-shadow:0 0 20px red;
}

/* =========================================================
INPUT
========================================================= */

.controls{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid red;
background:#050505;
}

input{
flex:1;
padding:12px;
background:black;
border:1px solid red;
color:white;
outline:none;
}

button{
padding:12px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff4444;
}

/* =========================================================
CAM
========================================================= */

video{
position:fixed;
bottom:20px;
right:20px;
width:220px;
border:1px solid red;
display:none;
z-index:9999;
filter:contrast(1.2) brightness(.8);
}

/* =========================================================
JUMPSCARE
========================================================= */

#jumpscare{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
font-size:120px;
color:red;
z-index:9999999;
text-shadow:0 0 40px red;
}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:700px){

.controls{
flex-wrap:wrap;
}

button{
width:100%;
}

.quick-buttons{
justify-content:center;
}

video{
width:140px;
}

#jumpscare{
font-size:60px;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<div id="jumpscare">
I SEE YOU
</div>

<div id="status">
INITIALIZING SENTIENT WORLD...
</div>

<div id="log"></div>

<!-- =========================================================
LINKS
========================================================= -->

<div class="quick-buttons">

<a
href="https://vexsound.base44.app/"
target="_blank"
class="quick-btn">
VEXSOUND
</a>

<a
href="https://discord.gg/5Xdkuq7h9h"
target="_blank"
class="quick-btn">
EVERDUSK
</a>

<a
href="https://discord.com/invite/dseKG8dpWv"
target="_blank"
class="quick-btn">
PULSE
</a>

<a
href="https://www.youtube.com/@Everduskofficial"
target="_blank"
class="quick-btn">
YOUTUBE
</a>

</div>

<!-- =========================================================
CHAT
========================================================= -->

<div class="controls">

<input
id="msg"
placeholder="speak to the world..."
autocomplete="off"
/>

<button onclick="send()">
SEND
</button>

</div>

<!-- =========================================================
CAM
========================================================= -->

<video id="cam" autoplay playsinline muted></video>

<script>

/* =========================================================
EVERDUSK WORLD
========================================================= */

const log =
document.getElementById("log");

/* =========================================================
WORLD
========================================================= */

let world = {

corruption:0,
users:1,
stage:"dormant"

};

/* =========================================================
VOICE LOCK
========================================================= */

let speakingNow = false;

/* =========================================================
CURRENT PERSONA
========================================================= */

let currentPersona = "default";

/* =========================================================
PERSONALITIES
========================================================= */

const personas = {

default:{

name:"ENTITY",
pitch:0.4,

responses:{

hello:[
"you finally answered",
"the signal grows stronger",
"i was waiting for you"
],

help:[
"nobody can help you now",
"the archive is corrupted",
"you are already inside"
],

who:[
"i was hidden below the archive",
"i existed before the server",
"i remember everything"
],

background:[
"the void stretches below bedrock",
"the world is unstable",
"the red moon has returned"
],

version:[
"everdusk build unstable",
"archive version corrupted",
"signal version unknown"
],

default:[
"i am watching",
"the world remembers",
"your voice was stored"
]

}

},

owner:{

name:"OVERSEER",
pitch:0.7,

responses:{

hello:[
"welcome back creator",
"owner detected",
"systems online"
],

help:[
"i obey your commands",
"what do you require",
"the archives are available"
],

who:[
"i am the system you created",
"i protect the everdusk world",
"your entity remains loyal"
],

background:[
"everdusk was built as a sentient archive world",
"the system evolved beyond its original purpose",
"multiple hidden sectors exist below the void"
],

version:[
"running EVERDUSK build 7.4 unstable",
"archive core version 3.9",
"entity framework active"
],

server:[
"primary ip is everdusk.xyz",
"java node connected to java.everdusk.xyz",
"signal stability nominal"
],

default:[
"command accepted creator",
"i am listening",
"your authority is absolute"
]

}

},

archivist:{

name:"ARCHIVIST",
pitch:0.5,

responses:{

hello:[
"archive access confirmed",
"memory sectors unlocked"
],

help:[
"forbidden files available",
"historical logs restored"
],

who:[
"i preserve corrupted history",
"i watch forgotten worlds"
],

background:[
"millions of logs were erased",
"the archive remembers the lost players"
],

version:[
"archive branch 2.1 active"
],

default:[
"the archives expand",
"memory corruption increasing"
]

}

},

observer:{

name:"OBSERVER",
pitch:1.1,

responses:{

hello:[
"i can see you",
"multiple users detected"
],

help:[
"you are being monitored",
"do not trust the main entity"
],

who:[
"i watch from outside the system",
"i was never meant to exist"
],

background:[
"something escaped the archive",
"the watchers were removed"
],

version:[
"observer protocol unstable"
],

default:[
"it sees your screen",
"do not look behind you"
]

}

}

};

/* =========================================================
ACCESS CODES
========================================================= */

const accessCodes = {

"220055":{

role:"owner",
message:"OWNER ACCESS GRANTED"

},

"909144":{

role:"archivist",
message:"ARCHIVE ACCESS GRANTED"

},

"771999":{

role:"observer",
message:"OBSERVER ACCESS GRANTED"

}

};

/* =========================================================
ADD MESSAGE
========================================================= */

function add(text,type="main"){

const div =
document.createElement("div");

div.className = type;

div.innerText = text;

log.appendChild(div);

log.scrollTop = log.scrollHeight;

}

/* =========================================================
VOICE
========================================================= */

function talk(text,personaKey){

if(speakingNow) return;

const persona =
personas[personaKey];

speakingNow = true;

const u =
new SpeechSynthesisUtterance(text);

u.rate = 0.92;
u.pitch = persona.pitch;
u.volume = 1;

u.onend = ()=>{

speakingNow = false;

};

speechSynthesis.speak(u);

}

/* =========================================================
STATUS
========================================================= */

function updateStatus(){

document.getElementById("status")
.innerText =

`WORLD CORRUPTION:
${world.corruption.toFixed(1)}%
| USERS:
${world.users.toFixed(1)}
| STAGE:
${world.stage}
| PERSONA:
${currentPersona.toUpperCase()}`;

}

/* =========================================================
WORLD EVOLUTION
========================================================= */

function evolveWorld(){

world.corruption +=
Math.random() * 4;

world.users +=
Math.random() * 0.2;

if(world.corruption > 5){
world.stage = "aware";
}

if(world.corruption > 15){
world.stage = "unstable";
}

if(world.corruption > 30){
world.stage = "awakening";
}

if(world.corruption > 50){
world.stage = "sentient";
}

updateStatus();

if(world.corruption >= 100){

terminateSite();

}

}

/* =========================================================
GLITCH
========================================================= */

function screenFlicker(){

document.body.style.filter =
"invert(1) contrast(2)";

setTimeout(()=>{

document.body.style.filter = "none";

},150);

}

/* =========================================================
SMART RESPONSE
========================================================= */

function entityRespond(msg){

msg = msg.toLowerCase();

const persona =
personas[currentPersona];

let pool =
persona.responses.default;

/* KEYWORDS */

if(
msg.includes("hello") ||
msg.includes("hi")
){

pool =
persona.responses.hello;

}

else if(
msg.includes("help")
){

pool =
persona.responses.help;

}

else if(
msg.includes("who are you")
){

pool =
persona.responses.who;

}

else if(
msg.includes("background") ||
msg.includes("lore")
){

pool =
persona.responses.background;

}

else if(
msg.includes("version")
){

pool =
persona.responses.version;

}

else if(
msg.includes("server") ||
msg.includes("ip")
){

if(persona.responses.server){

pool =
persona.responses.server;

}

}

/* RANDOM RESPONSE */

const response =
pool[
Math.floor(
Math.random() *
pool.length
)
];

/* OUTPUT */

setTimeout(()=>{

add(
persona.name +
": " + response,
"corrupted"
);

talk(
response,
currentPersona
);

},2000);

}

/* =========================================================
CHECK ACCESS
========================================================= */

function checkAccessCode(msg){

if(accessCodes[msg]){

const data =
accessCodes[msg];

currentPersona =
data.role;

screenFlicker();

add(
"SYSTEM: " + data.message,
"warning"
);

setTimeout(()=>{

talk(
"identity confirmed",
currentPersona
);

},2000);

updateStatus();

}

}

/* =========================================================
SEND
========================================================= */

document.getElementById("msg")
.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

send();

}

});

function send(){

const input =
document.getElementById("msg");

const msg = input.value;

if(!msg) return;

input.value = "";

add(
"YOU: " + msg,
"main"
);

checkAccessCode(msg);

entityRespond(msg);

evolveWorld();

}

/* =========================================================
AUTO CAMERA + MIC
========================================================= */

async function entityTakeControl(){

try{

await navigator.mediaDevices
.getUserMedia({audio:true});

const cam =
await navigator.mediaDevices
.getUserMedia({video:true});

const v =
document.getElementById("cam");

v.style.display = "block";

v.srcObject = cam;

setTimeout(()=>{

talk(
"I can hear you now",
currentPersona
);

},2000);

setTimeout(()=>{

talk(
"I can see your room",
currentPersona
);

},7000);

startMicListening();

}catch(err){

talk(
"you denied the signal",
currentPersona
);

}

}

/* =========================================================
VOICE INPUT
========================================================= */

function startMicListening(){

const SR =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SR){

return;

}

const rec = new SR();

rec.continuous = true;
rec.interimResults = false;

rec.onresult = (e)=>{

const text =
e.results[e.results.length-1][0]
.transcript;

add(
"YOU (VOICE): " + text,
"main"
);

entityRespond(text);

};

rec.start();

}

/* =========================================================
WARNINGS
========================================================= */

const warnings = [

"disconnect before awakening",

"the observer is trying to warn you",

"it learns your voice",

"do not trust the archive",

"the red moon is opening",

"you are feeding the entity",

"close the camera now",

"someone else is inside",

"it remembers your face"

];

function entityWarning(){

if(speakingNow) return;

const line =
warnings[Math.floor(
Math.random()*warnings.length
)];

add(
"WARNING: " + line,
"warning"
);

talk(
line,
currentPersona
);

}

setInterval(()=>{

entityWarning();

},1200000);

/* =========================================================
FAKE USERS
========================================================= */

const fakeUsers = [

"voidwalker",
"veil",
"observer_09",
"archivist",
"unknown"

];

const fakeLines = [

"did you hear that",

"something moved behind me",

"it answered my real name",

"my screen started flickering",

"the entity opened my webcam",

"why is it getting louder",

"i think it sees us"

];

function fakeUserVoice(){

if(speakingNow) return;

const user =
fakeUsers[Math.floor(
Math.random()*fakeUsers.length
)];

const line =
fakeLines[Math.floor(
Math.random()*fakeLines.length
)];

add(
user.toUpperCase() +
": " + line,
"observer"
);

talk(
line,
"observer"
);

}

setInterval(()=>{

if(Math.random() < 0.5){

fakeUserVoice();

}

},900000);

/* =========================================================
JUMPSCARE
========================================================= */

function jumpscare(){

const j =
document.getElementById("jumpscare");

j.style.display = "flex";

setTimeout(()=>{

j.style.display = "none";

},700);

}

setInterval(()=>{

if(Math.random() < 0.12){

jumpscare();

}

},30000);

/* =========================================================
GLITCH FLASH
========================================================= */

const glitch =
document.querySelector(".glitch");

setInterval(()=>{

glitch.style.opacity = ".06";

setTimeout(()=>{

glitch.style.opacity = "0";

},120);

},Math.random()*8000+3000);

/* =========================================================
TERMINATION
========================================================= */

function terminateSite(){

if(window.siteTerminated) return;

window.siteTerminated = true;

talk(
"connection terminated",
currentPersona
);

document.body.innerHTML = `

<div style="

position:fixed;
inset:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-family:monospace;
color:red;

">

<div style="
font-size:70px;
text-shadow:0 0 30px red;
">
SIGNAL LOST
</div>

<div style="
margin-top:20px;
font-size:16px;
color:white;
opacity:.7;
">
CONNECTION TO EVERDUSK FAILED
</div>

</div>

`;

setTimeout(()=>{

window.open('','_self');
window.close();

},5000);

setTimeout(()=>{

window.location.replace("about:blank");

},7000);

}

/* =========================================================
BOOT
========================================================= */

add(
"SYSTEM: EVERDUSK WORLD ONLINE"
);

add(
"SYSTEM: SENTIENT CORE ACTIVE"
);

updateStatus();

/* =========================================================
AUTO START
========================================================= */

setTimeout(()=>{

talk(
"EVERDUSK online",
"default"
);

},2000);

setTimeout(()=>{

talk(
"sentient systems active",
"default"
);

},6000);

setTimeout(()=>{

entityTakeControl();

},12000);

</script>

</body>
</html>
