<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* BASE */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.bg{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%), #000;
    z-index:-10;
}

.fog{
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    opacity:.06;
    filter:blur(5px);
    animation:fogMove 50s linear infinite;
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

/* ========================= */
/* SCANLINES */
/* ========================= */

.scanlines{
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02),
        transparent 3px
    );
    pointer-events:none;
}

/* ========================= */
/* MAIN */
/* ========================= */

.title{
    font-size:120px;
    text-align:center;
    margin-top:120px;
    text-shadow:0 0 30px red;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:40px;
}

.btn{
    padding:18px 40px;
    background:rgba(255,0,0,.1);
    border:1px solid rgba(255,0,0,.3);
    color:white;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:red;
}

/* ========================= */
/* MUSIC */
/* ========================= */

.music-player{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:9999;
}

#musicToggle{
    padding:10px 15px;
    background:black;
    border:1px solid red;
    color:white;
}

/* ========================= */
/* CUTSCENE */
/* ========================= */

.cutscene{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:999999;
}

.cutscene.active{
    display:flex;
}

/* SHAKE */
@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-2px,2px);}
50%{transform:translate(2px,-2px);}
75%{transform:translate(-2px,1px);}
100%{transform:translate(0,0);}
}

.cutscene.shake{
    animation:shake .15s;
}

/* FLASH */
#flash{
    position:fixed;
    inset:0;
    background:red;
    opacity:0;
    pointer-events:none;
    z-index:9999999;
}

/* COUNTDOWN */
.countdown{
    font-size:180px;
}

/* MINECRAFT BAR */
.bar{
    width:320px;
    height:10px;
    border:2px solid white;
    margin-top:20px;
}

.fill{
    height:100%;
    width:100%;
    background:red;
    transition:width 1s linear;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>

<h1 class="title">EVERDUSK</h1>

<div class="buttons">

<button class="btn" onclick="startTransfer('https://play.everdusk.xyz/wasm.html')">ENTER VOID</button>
<button class="btn" onclick="startTransfer('https://youtube.com')">YOUTUBE</button>
<button class="btn" onclick="startTransfer('https://discord.com')">DISCORD</button>
<button class="btn" onclick="startTransfer('https://vexsound.base44.app/')">VEXSOUND</button>

</div>

<!-- MUSIC -->

<div class="music-player">
<button id="musicToggle" onclick="toggleMusic()">PLAY MUSIC</button>
</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2023/06/29/audio_c9b29860a0.mp3">
</audio>

<!-- CUTSCENE -->

<div class="cutscene" id="cutscene">

<div class="countdown" id="countdown">5</div>

<div class="bar">
<div class="fill" id="bar"></div>
</div>

</div>

<!-- FLASH -->

<div id="flash"></div>

<script>

/* ========================= */
/* MUSIC FIX */
/* ========================= */

const music = document.getElementById("bgMusic");
const musicToggle = document.getElementById("musicToggle");

music.volume = 0.3;

document.body.addEventListener("click", () => {
    music.play().catch(()=>{});
}, { once:true });

function toggleMusic(){
    if(music.paused){
        music.play();
        musicToggle.innerText = "PAUSE MUSIC";
    } else {
        music.pause();
        musicToggle.innerText = "PLAY MUSIC";
    }
}

/* ========================= */
/* CUTSCENE SYSTEM */
/* ========================= */

const cutscene = document.getElementById("cutscene");
const countdownEl = document.getElementById("countdown");
const bar = document.getElementById("bar");
const flash = document.getElementById("flash");

let target = "";

/* voice */
function speak(t){
    const msg = new SpeechSynthesisUtterance(String(t));
    msg.rate = 0.9;
    msg.pitch = 0.7;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* sound */
const whoosh = new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3");

function startTransfer(url){

    target = url;

    cutscene.classList.add("active");

    let count = 5;
    bar.style.width = "100%";

    speak(count);
    whoosh.play();

    const interval = setInterval(() => {

        /* shake */
        cutscene.classList.add("shake");
        setTimeout(()=>cutscene.classList.remove("shake"),150);

        /* flash */
        flash.style.opacity = "0.5";
        setTimeout(()=>flash.style.opacity = "0",100);

        count--;

        if(count > 0){
            countdownEl.innerText = count;
            speak(count);
            bar.style.width = (count/5)*100 + "%";
        }

        if(count <= 0){

            clearInterval(interval);

            countdownEl.innerText = "0";
            speak("transfer complete");

            const end = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");
            end.play();

            setTimeout(() => {
                cutscene.classList.remove("active");
                window.location.href = target;
            }, 900);
        }

    },1000);
}

</script>

</body>
</html>
