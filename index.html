<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* RESET */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
    linear-gradient(to bottom, #050505, #000);
    z-index:-10;
}

.fog{
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    opacity:.06;
    animation:fogMove 50s linear infinite;
    filter:blur(5px);
    z-index:-9;
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

/* ========================= */
/* EFFECTS */
/* ========================= */

.scanlines{
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02),
        rgba(255,255,255,.02) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
    z-index:999;
}

.glitch{
    position:fixed;
    inset:0;
    background:red;
    opacity:0;
    pointer-events:none;
    mix-blend-mode:screen;
    z-index:999999;
}

.vhs{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:999998;
    mix-blend-mode:overlay;
    opacity:.18;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,0,0,.05),
        rgba(0,0,0,.05) 2px
    );
}

/* ========================= */
/* AI SPEAK */
/* ========================= */

#aiSpeak{
    position:fixed;
    top:18%;
    left:50%;
    transform:translateX(-50%);
    color:red;
    font-family:'IBM Plex Mono', monospace;
    font-size:18px;
    opacity:0;
    z-index:99999999;
    text-shadow:0 0 10px red;
}

/* ========================= */
/* JUMPSCARE */
/* ========================= */

#entityScare{
    position:fixed;
    inset:0;
    background:black;
    color:red;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:80px;
    font-weight:900;
    opacity:0;
    pointer-events:none;
    z-index:999999999;
    text-shadow:0 0 40px red;
}

/* ========================= */
/* BOOT SCREEN */
/* ========================= */

.boot-screen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:99999;
    animation:fadeOut 2s forwards;
    animation-delay:5s;
}

.boot-title{
    font-size:90px;
    font-weight:900;
    text-shadow:0 0 10px red,0 0 40px red;
}

.boot-sub{
    margin-top:20px;
    color:#ff2b2b;
    font-family:'IBM Plex Mono',monospace;
}

.loading-bar{
    width:400px;
    height:4px;
    background:#111;
    margin-top:40px;
    overflow:hidden;
}

.loading-fill{
    width:0%;
    height:100%;
    background:red;
    animation:load 4s forwards;
}

@keyframes load{from{width:0%;}to{width:100%;}}
@keyframes fadeOut{to{opacity:0;pointer-events:none;}}

/* ========================= */
/* CUTSCENE */
/* ========================= */

.cutscene{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999999;
}

.cutscene.active{display:flex;}

.countdown{
    font-size:220px;
    font-weight:900;
    text-shadow:0 0 60px red;
}

/* ========================= */
/* SYSTEM REBOOT */
/* ========================= */

.reboot{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10000000;
    color:lime;
    font-family:'IBM Plex Mono',monospace;
}

.reboot.active{display:flex;}

.reboot-text{
    font-size:26px;
    letter-spacing:3px;
}

.reboot-bar{
    width:420px;
    height:4px;
    background:#111;
    margin-top:30px;
    overflow:hidden;
}

.reboot-fill{
    width:0%;
    height:100%;
    background:lime;
    animation:rebootLoad 2s forwards;
}

@keyframes rebootLoad{
from{width:0%;}
to{width:100%;}
}

/* ========================= */
/* MAIN */
/* ========================= */

.main{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.small{
    color:#ff2b2b;
    letter-spacing:8px;
    margin-bottom:20px;
}

.title{
    font-size:120px;
    font-weight:900;
    text-shadow:0 0 10px red,0 0 100px red;
}

.desc{
    max-width:700px;
    margin:auto;
    color:#999;
    font-family:'IBM Plex Mono',monospace;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    padding:18px 40px;
    border:1px solid rgba(255,0,0,.3);
    background:rgba(255,0,0,.08);
    color:white;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:red;
    box-shadow:0 0 20px red;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>
<div class="vhs"></div>

<div id="aiSpeak"></div>
<div id="entityScare"></div>

<div class="boot-screen">
    <div class="boot-title">EVERDUSK</div>
    <div class="boot-sub">INITIALIZING VOID LINK...</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<section class="main">
<div>

<div class="small">THE WORLD NEVER SLEEPS</div>
<h1 class="title">EVERDUSK</h1>

<p class="desc">
WARNING: SYSTEM INSTABILITY DETECTED.
</p>

<div class="buttons">

<button class="btn" onclick="startTransfer('https://play.everdusk.xyz/wasm.html')">ENTER VOID</button>
<button class="btn" onclick="startTransfer('https://www.youtube.com/@Everduskofficial')">ARCHIVES</button>
<button class="btn" onclick="startTransfer('https://discord.gg/5Xdkuq7h9h')">JOIN</button>

</div>

</div>
</section>

<div class="cutscene" id="cutscene">
    <div class="countdown" id="countdown">5</div>
</div>

<div class="reboot" id="reboot">
    <div class="reboot-text">SYSTEM REBOOTING...</div>
    <div class="reboot-bar"><div class="reboot-fill"></div></div>
</div>

<script>

/* ========================= */
/* ELEMENTS */
/* ========================= */

const cutscene = document.getElementById("cutscene");
const countdown = document.getElementById("countdown");
const reboot = document.getElementById("reboot");
const scare = document.getElementById("entityScare");
const glitch = document.querySelector(".glitch");

/* ========================= */
/* AI VOICE */
/* ========================= */

function voice(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    msg.pitch = 0.2;
    speechSynthesis.speak(msg);
}

/* ========================= */
/* TEXT + VOICE */
/* ========================= */

function talk(t){
    voice(t);
}

/* ========================= */
/* JUMPSCARE */
/* ========================= */

const entities = ["ENTITY-07","NULL","BREACH","IT SEES YOU"];

function jump(){
    scare.innerText = entities[Math.floor(Math.random()*entities.length)];
    scare.style.opacity = 1;
    glitch.style.opacity = 0.3;

    setTimeout(()=>{
        scare.style.opacity = 0;
        glitch.style.opacity = 0;
    },150);
}

/* ========================= */
/* HEARTBEAT */
/* ========================= */

const ctx = new (window.AudioContext || window.webkitAudioContext)();

function beat(){
    const o = ctx.createOscillator();
    const g = ctx.createGain();

    o.frequency.value = 55;
    g.gain.value = 0.08;

    o.connect(g);
    g.connect(ctx.destination);

    o.start();
    o.stop(ctx.currentTime + 0.1);
}

document.addEventListener("click",()=>ctx.resume(),{once:true});

/* ========================= */
/* MAIN FUNCTION */
/* ========================= */

function startTransfer(url){

    let count = 5;
    cutscene.classList.add("active");

    const i = setInterval(()=>{

        beat();

        if(Math.random() > 0.6) jump();

        countdown.innerText = count;

        if(count === 3) talk("ENTITY APPROACHING");
        if(count === 2) talk("MEMORY COLLAPSE");
        if(count === 1) talk("FINAL SEQUENCE");

        count--;

        if(count < 0){
            clearInterval(i);

            talk("REBOOT INITIATED");

            // open link
            window.open(url,"_blank");

            // show reboot screen
            reboot.classList.add("active");

            setTimeout(()=>{

                reboot.classList.remove("active");
                cutscene.classList.remove("active");

                countdown.innerText = "5";

                scare.style.opacity = 0;
                glitch.style.opacity = 0;

            }, 2200);
        }

    },1000);
}

</script>

</body>
</html>
