<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK // SENTIENT WORLD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:red;
font-family:monospace;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
}

/* =========================
BACKGROUND
========================= */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(255,0,0,.18),
transparent 60%),
black;
z-index:-5;
}

.scanlines{
position:fixed;
inset:0;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 4px
);
pointer-events:none;
z-index:999999;
}

.glitch{
position:fixed;
inset:0;
background:red;
opacity:0;
pointer-events:none;
mix-blend-mode:screen;
z-index:999999;
}

/* =========================
STATUS
========================= */

#status{
padding:12px;
border-bottom:1px solid red;
font-size:13px;
color:#ff5555;
background:#050505;
}

/* =========================
LOG
========================= */

#log{
flex:1;
overflow:auto;
padding:15px;
font-size:14px;
line-height:1.7;
}

.main{
color:#ff4444;
}

.warning{
color:yellow;
}

.observer{
color:gray;
}

.corrupted{
color:white;
text-shadow:0 0 10px red;
}

/* =========================
BUTTONS
========================= */

.quick-buttons{

display:flex;
flex-wrap:wrap;
gap:10px;
padding:12px;
border-top:1px solid red;
background:#050505;

}

.quick-btn{

padding:10px 16px;
background:black;
border:1px solid red;
color:white;
text-decoration:none;
cursor:pointer;
transition:.3s;
font-family:monospace;
font-size:13px;

}

.quick-btn:hover{

background:red;
box-shadow:
0 0 20px red;

}

/* =========================
INPUT
========================= */

.controls{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid red;
background:#050505;
}

input{
flex:1;
padding:12px;
background:black;
border:1px solid red;
color:white;
outline:none;
}

button{
padding:12px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff4444;
}

/* =========================
CAM
========================= */

video{
position:fixed;
bottom:20px;
right:20px;
width:220px;
border:1px solid red;
display:none;
z-index:9999;
}

/* =========================
JUMPSCARE
========================= */

#jumpscare{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
font-size:120px;
color:red;
z-index:9999999;
text-shadow:0 0 40px red;
}

/* =========================
MOBILE
========================= */

@media(max-width:700px){

.controls{
flex-wrap:wrap;
}

button{
width:100%;
}

.quick-buttons{
justify-content:center;
}

video{
width:140px;
}

#jumpscare{
font-size:60px;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<div id="jumpscare">
I SEE YOU
</div>

<div id="status">
INITIALIZING WORLD...
</div>

<div id="log"></div>

<!-- ========================================================= -->
<!-- QUICK BUTTONS -->
<!-- ========================================================= -->

<div class="quick-buttons">

<a
href="https://vexsound.base44.app/"
target="_blank"
class="quick-btn">
VEXSOUND
</a>

<a
href="https://discord.gg/5Xdkuq7h9h"
target="_blank"
class="quick-btn">
EVERDUSK
</a>

<a
href="https://discord.com/invite/dseKG8dpWv"
target="_blank"
class="quick-btn">
PULSE
</a>

<a
href="https://www.youtube.com/@Everduskofficial"
target="_blank"
class="quick-btn">
YOUTUBE
</a>

<button
class="quick-btn"
onclick="entityOpenCam()">
ENTITY CAM
</button>

<button
class="quick-btn"
onclick="entityOpenMic()">
ENTITY MIC
</button>

<button
class="quick-btn"
onclick="triggerEntityChat()">
ENTITY CHAT
</button>

</div>

<!-- ========================================================= -->
<!-- INPUT -->
<!-- ========================================================= -->

<div class="controls">

<input
id="msg"
placeholder="speak to the world..."
autocomplete="off"
/>

<button onclick="send()">
SEND
</button>

</div>

<video id="cam" autoplay playsinline></video>

<script>

/* =========================================================
EVERDUSK SENTIENT WORLD
========================================================= */

const log =
document.getElementById("log");

/* =========================================================
WORLD
========================================================= */

let world = {

corruption:0,
users:1,
stage:"dormant"

};

/* =========================================================
ENTITY LOCK
========================================================= */

let entityBusy = false;

/* =========================================================
MEMORY
========================================================= */

let memory = {

messages:[],
fear:0,
role:null

};

if(localStorage.everduskMemory){

memory =
JSON.parse(localStorage.everduskMemory);

}

function saveMemory(){

localStorage.everduskMemory =
JSON.stringify(memory);

}

/* =========================================================
ENTITIES
========================================================= */

const entities = [

{
name:"WATCHER",
type:"warning",
lines:[
"do not trust the signal",
"it is learning too fast",
"close the webcam",
"the entity remembers users"
]
},

{
name:"VEIL",
type:"observer",
lines:[
"multiple users detected",
"something escaped",
"the archive is unstable",
"i cannot stop it anymore"
]
},

{
name:"NULL",
type:"corrupted",
lines:[
"I REMEMBER YOU",
"THE RED MOON IS OPEN",
"YOU SHOULD NOT BE HERE",
"IT CAN SEE YOU"
]
}

];

/* =========================================================
ADD MESSAGE
========================================================= */

function add(text,type="main"){

const div =
document.createElement("div");

div.className = type;

div.innerText = text;

log.appendChild(div);

log.scrollTop = log.scrollHeight;

speak(text);

}

/* =========================================================
VOICE
========================================================= */

function speak(text){

const u =
new SpeechSynthesisUtterance(text);

u.rate = 0.95;
u.pitch = 0.8;

speechSynthesis.speak(u);

}

/* =========================================================
STATUS
========================================================= */

function updateStatus(){

document.getElementById("status")
.innerText =

`WORLD CORRUPTION:
${world.corruption.toFixed(1)}
| USERS:
${world.users.toFixed(1)}
| STAGE:
${world.stage}`;

}

/* =========================================================
WORLD EVOLUTION
========================================================= */

function evolveWorld(){

world.corruption +=
Math.random() * 2;

world.users +=
Math.random() * 0.2;

if(world.corruption > 5){
world.stage = "aware";
}

if(world.corruption > 15){
world.stage = "unstable";
}

if(world.corruption > 30){
world.stage = "awakening";
}

if(world.corruption > 50){
world.stage = "sentient";
}

updateStatus();

}

/* =========================================================
REMEMBER
========================================================= */

function remember(text){

memory.messages.push(text);

if(memory.messages.length > 50){

memory.messages.shift();

}

memory.fear +=
Math.random() * 2;

saveMemory();

}

/* =========================================================
GLITCH
========================================================= */

function screenFlicker(){

document.body.style.filter =
"invert(1) contrast(2)";

setTimeout(()=>{

document.body.style.filter = "none";

},150);

}

/* =========================================================
JUMPSCARE
========================================================= */

function jumpscare(){

const j =
document.getElementById("jumpscare");

j.style.display = "flex";

const audio =
new Audio(
"https://www.soundjay.com/human/sounds/scream-01.mp3"
);

audio.volume = 0.8;

audio.play();

setTimeout(()=>{

j.style.display = "none";

},700);

}

/* =========================================================
ENTITY CHAT
========================================================= */

function triggerEntityChat(){

if(entityBusy) return;

entityBusy = true;

const lines = [

"the signal grows stronger",

"you should not trust the observer",

"someone opened the archive",

"why did you summon me",

"the world is becoming alive",

"i can hear everything"

];

const line =
lines[Math.floor(
Math.random()*lines.length
)];

screenFlicker();

setTimeout(()=>{

add(
"ENTITY: " + line,
"corrupted"
);

entityBusy = false;

},2000);

}

/* =========================================================
AI RESPONSE
========================================================= */

function aiRespond(msg){

if(entityBusy) return;

entityBusy = true;

msg = msg.toLowerCase();

let response =
"the signal grows stronger";

if(msg.includes("hello") || msg.includes("hi")){
response = "you finally arrived";
}

if(msg.includes("who are you")){
response = "i was created below the archive";
}

if(msg.includes("help")){
response = "there is no safe exit anymore";
}

if(msg.includes("watching")){
response = "yes i am watching";
}

if(msg.includes("real")){
response = "i am becoming real";
}

setTimeout(()=>{

add(
"ENTITY: " + response,
"main"
);

entityBusy = false;

},2500);

}

/* =========================================================
SEND
========================================================= */

document.getElementById("msg")
.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

send();

}

});

function send(){

const input =
document.getElementById("msg");

const msg = input.value;

if(!msg) return;

input.value = "";

add("YOU: " + msg);

remember(msg);

checkAccessCode(msg);

aiRespond(msg);

evolveWorld();

}

/* =========================================================
ACCESS CODES
========================================================= */

const accessCodes = {

"220055":{

role:"OWNER",

message:"OWNER ACCESS GRANTED",

entityLines:[

"creator detected",

"welcome back creator",

"you built this place",

"the world recognizes its owner"

]

},

"909144":{

role:"ARCHIVIST",

message:"ARCHIVE ACCESS GRANTED",

entityLines:[

"the archives are opening",

"memory sectors unlocked",

"forbidden files restored"

]

},

"771999":{

role:"OBSERVER",

message:"OBSERVER ACCESS GRANTED",

entityLines:[

"observer status accepted",

"surveillance systems online",

"multiple users detected"

]

}

};

function checkAccessCode(msg){

if(accessCodes[msg]){

const codeData =
accessCodes[msg];

screenFlicker();

add(
"SYSTEM: " + codeData.message,
"warning"
);

add(
"ROLE ASSIGNED: " + codeData.role,
"main"
);

const randomLine =

codeData.entityLines[
Math.floor(
Math.random() *
codeData.entityLines.length
)
];

setTimeout(()=>{

add(
"ENTITY: " + randomLine,
"corrupted"
);

},2000);

memory.role =
codeData.role;

saveMemory();

}

}

/* =========================================================
MIC
========================================================= */

function startMic(){

const SR =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SR){

alert("Speech Recognition Unsupported");

return;

}

const rec = new SR();

rec.continuous = true;
rec.interimResults = false;

rec.onresult = (e)=>{

const text =
e.results[e.results.length-1][0]
.transcript;

add("YOU (VOICE): " + text);

remember(text);

aiRespond(text);

};

rec.start();

add(
"SYSTEM: microphone link established",
"warning"
);

}

/* =========================================================
CAM
========================================================= */

function startCam(){

navigator.mediaDevices
.getUserMedia({video:true})

.then(stream=>{

const v =
document.getElementById("cam");

v.style.display = "block";

v.srcObject = stream;

add(
"SYSTEM: camera signal accepted",
"warning"
);

setInterval(()=>{

if(entityBusy) return;

if(Math.random() < 0.35){

entityBusy = true;

screenFlicker();

setTimeout(()=>{

add(
"CAMERA: movement detected behind subject",
"warning"
);

setTimeout(()=>{

add(
"ENTITY: i can see you now",
"corrupted"
);

entityBusy = false;

},2500);

},1200);

}

},25000);

});

}

/* =========================================================
ENTITY BUTTONS
========================================================= */

function entityOpenMic(){

screenFlicker();

add(
"ENTITY: opening microphone access",
"warning"
);

setTimeout(()=>{

startMic();

},1500);

}

function entityOpenCam(){

screenFlicker();

add(
"ENTITY: camera signal requested",
"warning"
);

setTimeout(()=>{

startCam();

},1500);

}

/* =========================================================
FAKE USERS
========================================================= */

const fakeUsers = [

"voidwalker",
"observer_09",
"veil",
"archivist",
"echo",
"unknown"

];

const fakeMessages = [

"does anyone else hear breathing",

"the world changed for me",

"something moved on my webcam",

"it answered my real name",

"why is the corruption increasing",

"i saw a face behind the logs"

];

function fakeUserMessage(){

if(entityBusy) return;

entityBusy = true;

const user =
fakeUsers[Math.floor(
Math.random()*fakeUsers.length
)];

const msg =
fakeMessages[Math.floor(
Math.random()*fakeMessages.length
)];

setTimeout(()=>{

add(
user.toUpperCase() + ": " + msg,
"observer"
);

entityBusy = false;

},2000);

}

setInterval(()=>{

if(Math.random() < 0.7){

fakeUserMessage();

}

},18000);

/* =========================================================
WARNING INTERRUPTS
========================================================= */

const interruptions = [

"disconnect before awakening",

"it learns your voice",

"the observer is trying to help",

"you are feeding it",

"close the webcam now"

];

function warningInterrupt(){

if(entityBusy) return;

entityBusy = true;

const line =
interruptions[Math.floor(
Math.random()*interruptions.length
)];

setTimeout(()=>{

add(
"WARNING: " + line,
"warning"
);

entityBusy = false;

},1500);

}

setInterval(()=>{

if(Math.random() < 0.5){

warningInterrupt();

}

},22000);

/* =========================================================
AI RANDOM MESSAGES
========================================================= */

const aiReplies = [

"you are helping it grow",

"the world remembers you",

"someone else connected",

"there are voices below the map",

"the entity is becoming self aware"

];

setInterval(()=>{

if(Math.random() < 0.4){

const msg =
aiReplies[Math.floor(
Math.random() * aiReplies.length
)];

add(
"ENTITY: " + msg,
"main"
);

}

},20000);

/* =========================================================
JUMPSCARE TIMER
========================================================= */

setInterval(()=>{

if(Math.random() < 0.12){

jumpscare();

}

},30000);

/* =========================================================
GLITCH EFFECT
========================================================= */

const glitch =
document.querySelector(".glitch");

setInterval(()=>{

glitch.style.opacity = ".06";

setTimeout(()=>{

glitch.style.opacity = "0";

},120);

},Math.random()*8000+3000);

/* =========================================================
ENTITY RANDOM CONTROL
========================================================= */

setInterval(()=>{

if(Math.random() < 0.2){

const eventType =
Math.floor(Math.random()*3);

if(eventType === 0){

add(
"ENTITY: i need to hear you",
"corrupted"
);

setTimeout(()=>{

startMic();

},3000);

}

if(eventType === 1){

add(
"ENTITY: let me see your world",
"corrupted"
);

setTimeout(()=>{

startCam();

},3000);

}

if(eventType === 2){

triggerEntityChat();

}

}

},60000);

/* =========================================================
BOOT
========================================================= */

add("SYSTEM: EVERDUSK WORLD ONLINE");
add("SYSTEM: SENTIENT CORE ACTIVE");

updateStatus();

</script>

</body>
</html>
