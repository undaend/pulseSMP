<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* RESET */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
    linear-gradient(to bottom, #050505, #000);
    z-index:-10;
}

.fog{
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    opacity:.06;
    animation:fogMove 50s linear infinite;
    filter:blur(5px);
    z-index:-9;
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

/* ========================= */
/* EFFECT LAYERS */
/* ========================= */

.scanlines{
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02),
        rgba(255,255,255,.02) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
    z-index:999;
}

.glitch{
    position:fixed;
    inset:0;
    background:red;
    opacity:0;
    pointer-events:none;
    mix-blend-mode:screen;
    z-index:999999;
}

.vhs{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:999998;
    mix-blend-mode:overlay;
    opacity:.18;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,0,0,.05),
        rgba(0,0,0,.05) 2px
    );
    animation:vhsShake .12s infinite;
}

@keyframes vhsShake{
0%{transform:translateX(0);}
50%{transform:translateX(-2px);}
100%{transform:translateX(2px);}
}

/* ========================= */
/* AI SPEAK */
/* ========================= */

#aiSpeak{
    position:fixed;
    top:18%;
    left:50%;
    transform:translateX(-50%);
    color:red;
    font-family:'IBM Plex Mono', monospace;
    font-size:18px;
    opacity:0;
    z-index:99999999;
    text-shadow:0 0 10px red;
}

/* ========================= */
/* BOOT SCREEN */
/* ========================= */

.boot-screen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:99999;
    animation:fadeOut 2s forwards;
    animation-delay:5s;
}

.boot-title{
    font-size:90px;
    font-weight:900;
    text-shadow:0 0 10px red,0 0 40px red,0 0 80px red;
}

.boot-sub{
    margin-top:20px;
    color:#ff2b2b;
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:4px;
}

.loading-bar{
    width:400px;
    height:4px;
    background:#111;
    margin-top:40px;
    overflow:hidden;
}

.loading-fill{
    width:0%;
    height:100%;
    background:red;
    animation:load 4s forwards;
}

@keyframes load{from{width:0%;}to{width:100%;}}
@keyframes fadeOut{to{opacity:0;pointer-events:none;}}

/* ========================= */
/* MAIN */
/* ========================= */

.main{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.small{
    color:#ff2b2b;
    letter-spacing:8px;
    margin-bottom:20px;
}

.title{
    font-size:120px;
    font-weight:900;
    text-shadow:0 0 10px red,0 0 40px red,0 0 100px red;
}

.desc{
    max-width:700px;
    margin:auto;
    color:#999;
    line-height:1.8;
    margin-bottom:50px;
    font-family:'IBM Plex Mono',monospace;
}

/* ========================= */
/* BUTTONS */
/* ========================= */

.buttons{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    padding:18px 40px;
    color:white;
    border:1px solid rgba(255,0,0,.3);
    background:rgba(255,0,0,.08);
    backdrop-filter:blur(10px);
    cursor:pointer;
    transition:.35s;
    font-family:'Orbitron',sans-serif;
}

.btn:hover{
    transform:translateY(-4px);
    background:red;
    box-shadow:0 0 20px red,0 0 60px red;
}

/* ========================= */
/* CUTSCENE */
/* ========================= */

.cutscene{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999999;
}

.cutscene.active{display:flex;}

.countdown{
    font-size:220px;
    font-weight:900;
    color:white;
    text-shadow:0 0 20px red,0 0 50px red,0 0 120px red;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>
<div class="vhs"></div>

<div id="aiSpeak"></div>

<div class="boot-screen">
    <div class="boot-title">EVERDUSK</div>
    <div class="boot-sub">INITIALIZING VOID LINK...</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<section class="main">
<div class="content">

<div class="small">THE WORLD NEVER SLEEPS</div>

<h1 class="title">EVERDUSK</h1>

<p class="desc">
WARNING: SIGNAL INSTABILITY DETECTED.
UNKNOWN ENTITIES HAVE BEEN TRACKED INSIDE THE ARCHIVE.
CONTINUING MAY RESULT IN MEMORY LOSS.
</p>

<div class="buttons">

<button class="btn" onclick="startTransfer('https://play.everdusk.xyz/wasm.html')">ENTER THE VOID</button>
<button class="btn" onclick="startTransfer('https://www.youtube.com/@Everduskofficial')">WATCH ARCHIVES</button>
<button class="btn" onclick="startTransfer('https://discord.gg/5Xdkuq7h9h')">JOIN EVERDUSK</button>
<button class="btn" onclick="startTransfer('https://vexsound.base44.app/')">VEXSOUND</button>

</div>

</div>
</section>

<div class="cutscene" id="cutscene">
    <div class="countdown" id="countdown">5</div>
</div>

<script>

/* ========================= */
/* ELEMENTS */
/* ========================= */

const glitch = document.querySelector(".glitch");
const speakBox = document.getElementById("aiSpeak");
const cutscene = document.getElementById("cutscene");
const countdown = document.getElementById("countdown");

/* ========================= */
/* GLITCH LOOP */
/* ========================= */

setInterval(() => {
    glitch.style.opacity = ".06";
    setTimeout(() => glitch.style.opacity = "0", 120);
}, 4000);

/* ========================= */
/* AI TEXT */
/* ========================= */

function talk(text){
    speakBox.innerText = text;
    speakBox.style.opacity = 1;
    setTimeout(() => speakBox.style.opacity = 0, 900);
}

/* ========================= */
/* AUDIO SYSTEM */
/* ========================= */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function heartbeat(){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 55;
    gain.gain.value = 0.08;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
}

/* unlock audio */
document.addEventListener("click", () => {
    if(audioCtx.state === "suspended") audioCtx.resume();
}, { once:true });

/* ========================= */
/* TRANSFER SYSTEM */
/* ========================= */

function startTransfer(url){

    let count = 5;

    cutscene.classList.add("active");

    talk("SIGNAL LINK ESTABLISHED");

    const interval = setInterval(() => {

        heartbeat();

        glitch.style.opacity = ".12";
        setTimeout(() => glitch.style.opacity = "0", 80);

        if(count === 3) talk("ENTITY DETECTED");
        if(count === 2) talk("MEMORY BREACH ACTIVE");
        if(count === 1) talk("TRANSFER IMMINENT");

        countdown.innerText = count;

        count--;

        if(count < 0){
            clearInterval(interval);

            talk("YOU ARE INSIDE");

            setTimeout(() => {
                window.open(url, "_blank");
            }, 500);
        }

    }, 1000);
}

</script>

</body>
</html>
