<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* BASE RESET */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
}

/* ========================= */
/* BACKGROUND SYSTEM */
/* ========================= */

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
    linear-gradient(to bottom, #050505, #000);
    z-index:-10;
}

.fog{
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    opacity:.06;
    animation:fogMove 50s linear infinite;
    filter:blur(5px);
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

.scanlines{
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(to bottom,rgba(255,255,255,.02),transparent 3px);
    pointer-events:none;
    z-index:999;
}

/* ========================= */
/* GLITCH SYSTEM */
/* ========================= */

.glitch{
    position:fixed;
    inset:0;
    background:red;
    opacity:0;
    pointer-events:none;
    mix-blend-mode:screen;
    z-index:999999;
}

/* ========================= */
/* CUTSCENE */
/* ========================= */

.cutscene{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999999;
}

.cutscene.active{
    display:flex;
}

.smallText{
    font-size:14px;
    color:#ff3b3b;
    letter-spacing:3px;
    margin-bottom:10px;
    font-family:'IBM Plex Mono', monospace;
    opacity:.8;
}

.countdown{
    font-size:220px;
    font-weight:900;
    text-shadow:0 0 30px red;
}

/* ========================= */
/* JUMPSCARE LAYER */
/* ========================= */

#scare{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:black;
    z-index:1000000000;
}

#scare.active{
    display:flex;
}

#scare img{
    width:100%;
    height:100%;
    object-fit:cover;
    animation:shake .06s infinite;
}

@keyframes shake{
0%{transform:translateX(0);}
50%{transform:translateX(-5px);}
100%{transform:translateX(5px);}
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<div class="cutscene" id="cutscene">

    <div class="smallText" id="status">SYSTEM INITIALIZING</div>
    <div class="countdown" id="countdown">5</div>

</div>

<div id="scare"></div>

<script>

/* ========================= */
/* GLITCH LOOP */
/* ========================= */

setInterval(()=>{
document.querySelector('.glitch').style.opacity=.06;
setTimeout(()=>document.querySelector('.glitch').style.opacity=0,100);
},3500);

/* ========================= */
/* JUMPSCARES */
/* ========================= */

const jumpscares = [
"https://cdn.corenexis.com/files/c/1164486720.webp",
"https://cdn.corenexis.com/files/c/9536946720.jpg",
"https://cdn.corenexis.com/files/c/2912219720.webp"
];

/* ========================= */
/* AI STATUS PHRASES */
/* ========================= */

const phases = [
"LINK STABILIZING",
"SIGNAL INTERFERENCE",
"UNKNOWN ENTITY DETECTED",
"MEMORY FRAGMENTING",
"FINALIZATION SEQUENCE"
];

/* ========================= */
/* MAIN FUNCTION */
/* ========================= */

function startTransfer(url){

let count = 5;

const cutscene = document.getElementById("cutscene");
const countdown = document.getElementById("countdown");
const status = document.getElementById("status");
const scare = document.getElementById("scare");

cutscene.classList.add("active");

const interval = setInterval(()=>{

/* update text */
status.innerText = phases[5 - count] || "SYSTEM ERROR";
countdown.innerText = count;

/* glitch burst */
if(count <= 3){
document.querySelector('.glitch').style.opacity = 0.1;
setTimeout(()=>document.querySelector('.glitch').style.opacity=0,80);
}

/* decrement */
count--;

if(count < 0){

clearInterval(interval);

/* FINAL GLITCH EXPLOSION */
for(let i=0;i<8;i++){
setTimeout(()=>{
document.querySelector('.glitch').style.opacity = 0.8;
setTimeout(()=>document.querySelector('.glitch').style.opacity=0,60);
},i*50);
}

/* JUMPSCARE */
const img = jumpscares[Math.floor(Math.random()*jumpscares.length)];

scare.innerHTML = `<img src="${img}">`;
scare.classList.add("active");

/* HOLD SCENE */
setTimeout(()=>{

scare.classList.remove("active");

/* OPEN LINK */
window.open(url,"_blank");

/* RESET */
setTimeout(()=>{
cutscene.classList.remove("active");
countdown.innerText="5";
status.innerText="SYSTEM INITIALIZING";
},600);

},1400);

}

},1000);

}

</script>

</body>
</html>
