<script>

/* =========================
   SAFE PATCH SYSTEM (ADDITIVE ONLY)
   ========================= */

/* ---------- CUTSCENE OVERLAY (NEW) ---------- */

const _cutscene = document.createElement("div");
_cutscene.style.position = "fixed";
_cutscene.style.inset = "0";
_cutscene.style.display = "none";
_cutscene.style.alignItems = "center";
_cutscene.style.justifyContent = "center";
_cutscene.style.flexDirection = "column";
_cutscene.style.background = "black";
_cutscene.style.zIndex = "99999999";
document.body.appendChild(_cutscene);

/* countdown text */
const _count = document.createElement("div");
_count.style.fontSize = "180px";
_count.style.color = "white";
_count.style.textShadow = "0 0 20px red";
_cutscene.appendChild(_count);

/* XP BAR */
const _xp = document.createElement("div");
_xp.style.width = "400px";
_xp.style.height = "10px";
_xp.style.marginTop = "20px";
_xp.style.border = "1px solid red";
_xp.style.position = "relative";
_cutscene.appendChild(_xp);

const _xpFill = document.createElement("div");
_xpFill.style.position = "absolute";
_xpFill.style.left = "0";
_xpFill.style.top = "0";
_xpFill.style.height = "100%";
_xpFill.style.width = "0%";
_xpFill.style.background = "red";
_xp.appendChild(_xpFill);

/* ---------- VHS OVERLAY ---------- */

const _vhs = document.createElement("div");
_vhs.style.position = "fixed";
_vhs.style.inset = "0";
_vhs.style.pointerEvents = "none";
_vhs.style.opacity = "0";
_vhs.style.background = "repeating-linear-gradient(to bottom, rgba(255,0,0,0.05), transparent 2px)";
_vhs.style.mixBlendMode = "screen";
_vhs.style.zIndex = "99999998";
document.body.appendChild(_vhs);

/* ---------- SOUND SYSTEM ---------- */

const _beep = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");
const _whoosh = new Audio("https://assets.mixkit.co/active_storage/sfx/1512/1512-preview.mp3");

/* ---------- GLITCH SHAKE (ADD ONLY) ---------- */

function _shake(){
    document.body.style.transform = "translateX(" + (Math.random()*6-3) + "px)";
    setTimeout(()=>document.body.style.transform="none",80);
}

/* ---------- RED PULSE ---------- */

function _pulse(){
    document.body.style.filter = "brightness(2) contrast(2)";
    setTimeout(()=>document.body.style.filter="none",120);
}

/* ---------- MAIN PATCH FUNCTION (DOES NOT TOUCH YOUR BUTTONS) ---------- */

function startTransfer(url){

    let t = 5;
    _cutscene.style.display = "flex";

    _whoosh.play();

    const interval = setInterval(()=>{

        _shake();
        _pulse();

        _beep.currentTime = 0;
        _beep.play();

        _count.innerText = t;

        /* XP BAR ANIMATION */
        _xpFill.style.width = ((5 - t) / 5 * 100) + "%";

        /* VHS MODE ON DURING COUNTDOWN */
        _vhs.style.opacity = "0.2";

        t--;

        if(t < 0){
            clearInterval(interval);

            _vhs.style.opacity = "0";

            _cutscene.style.display = "none";

            window.open(url, "_blank");
        }

    },1000);
}

/* ---------- FULLSCREEN BUTTON (ADDED SAFE) ---------- */

function toggleFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

/* ---------- MUSIC FIX (DOES NOT CHANGE YOUR SYSTEM) ---------- */

const _music = document.querySelector("audio");

if(_music){
    _music.volume = 0.3;
    document.addEventListener("click", ()=>{
        _music.play().catch(()=>{});
    }, { once:true });
}

/* ---------- VHS RANDOM FLICKER ---------- */

setInterval(()=>{
    _vhs.style.opacity = (Math.random()*0.2);
},120);

/* =========================
   END PATCH
   ========================= */

</script>
