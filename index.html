<div class="bloodmoon"></div>



<style>

/* BLOODMOON BACKGROUND */

.bloodmoon{
  position:fixed;
  inset:0;

  /* YOUR IMAGE */
  background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65)),
    url('https://cdn.corenexis.com/files/c/3236352720.png');

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  z-index:-4;

  animation:slowZoom 30s ease-in-out infinite;
}

/* STRONGER RAIN */

.weather{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
  overflow:hidden;
}

/* HEAVY RAIN */

.rain::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    linear-gradient(
      transparent 0%,
      rgba(255,255,255,0.55) 100%
    );

  background-size:2px 120px;

  transform:rotate(12deg) scale(1.5);

  animation:rainFall .22s linear infinite;

  opacity:.55;
}

/* EXTRA RAIN LAYER */

.rain::after{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    linear-gradient(
      transparent 0%,
      rgba(255,0,0,0.25) 100%
    );

  background-size:3px 160px;

  transform:rotate(15deg) scale(1.8);

  animation:rainFall .35s linear infinite;

  opacity:.35;
}

@keyframes rainFall{
  from{
    background-position:0 0;
  }

  to{
    background-position:-80px 250px;
  }
}

</style>
